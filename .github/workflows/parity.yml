name: Parity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "**"]

jobs:
  parity:
    name: Ruby DSL ↔ Rust hecks-life
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            hecks_life/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('hecks_life/Cargo.lock', 'hecks_life/Cargo.toml') }}

      - name: Build hecks-life (release)
        working-directory: hecks_life
        run: cargo build --release --quiet

      - name: Cargo tests (incl. conceiver_parity_test)
        working-directory: hecks_life
        run: cargo test --release --quiet

      - name: Run parser parity suite (Ruby DSL ↔ Rust IR)
        run: bundle exec ruby -Ilib spec/parity/parity_test.rb

      - name: Run behaviors-runner parity suite (Ruby ↔ Rust)
        run: bundle exec ruby -Ilib spec/parity/behaviors_parity_test.rb

      - name: Lifecycle validator across all bluebooks
        run: |
          BAD=""
          for f in $(find hecks_conception -name "*.bluebook" \
                        ! -name "*_behavioral_tests.bluebook"); do
            if ! hecks_life/target/release/hecks-life check-lifecycle "$f" >/dev/null 2>&1; then
              BAD="$BAD\n  $f"
            fi
          done
          if [ -n "$BAD" ]; then
            echo "::error::Lifecycle validator found unreachable transitions:"
            printf "$BAD\n"
            exit 1
          fi
          echo "All bluebooks pass check-lifecycle"

      - name: Behavioral test corpus sweep (must be 100%)
        run: |
          BIN=hecks_life/target/release/hecks-life
          tot_pass=0; tot_fail=0; tot_err=0
          for tf in $(find hecks_conception -name "*_behavioral_tests.bluebook"); do
            out=$($BIN behaviors "$tf" 2>&1 | tail -1)
            pass=$(echo "$out" | grep -oE '[0-9]+ passed' | grep -oE '[0-9]+' || echo 0)
            fail=$(echo "$out" | grep -oE '[0-9]+ failed' | grep -oE '[0-9]+' || echo 0)
            err=$(echo "$out"  | grep -oE '[0-9]+ errored' | grep -oE '[0-9]+' || echo 0)
            tot_pass=$((tot_pass + ${pass:-0}))
            tot_fail=$((tot_fail + ${fail:-0}))
            tot_err=$((tot_err  + ${err:-0}))
          done
          echo "TOTAL: $tot_pass passed, $tot_fail failed, $tot_err errored"
          if [ "$tot_fail" -ne 0 ] || [ "$tot_err" -ne 0 ]; then
            echo "::error::Behavioral test corpus regressed — run hecks-life behaviors locally"
            exit 1
          fi
