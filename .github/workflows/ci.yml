name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  full-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle install
      - run: bundle exec rspec
      - name: Smoke test
        run: ruby -Ihecksties/lib -Ihecks_model/lib -Ihecks_domain/lib -Ihecks_runtime/lib -Ihecks_session/lib -Ihecks_cli/lib -Ihecks_persist/lib examples/pizzas/app.rb

  component:
    name: "${{ matrix.component }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - hecksties
          - hecks_model
          - hecks_domain
          - hecks_runtime
          - hecks_session
          - hecks_cli
          - hecks_persist
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle install
      - name: Run ${{ matrix.component }} specs
        run: cd ${{ matrix.component }} && rake spec
