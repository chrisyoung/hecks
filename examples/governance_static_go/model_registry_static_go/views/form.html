{{ define "form" }}
<h1>{{ .CommandName }}</h1>
{{ if .ErrorMessage }}<div class="flash-error">{{ .ErrorMessage }}</div>{{ end }}
<form method="post" action="{{ .Action }}">
  {{ range .Fields }}
    {{ if eq .Type "hidden" }}
      <input type="hidden" name="{{ .Name }}" value="{{ .Value }}">
    {{ else if eq .Type "select" }}
      <label>{{ .Label }}{{ if .Required }}<span class="required">required</span>{{ end }}</label>
      <select name="{{ .Name }}" required>
        {{ range .Options }}
        <option value="{{ .Value }}"{{ if .Selected }} selected{{ end }}>{{ .Label }}</option>
        {{ end }}
      </select>
    {{ else }}
      <label>{{ .Label }}{{ if .Required }}<span class="required">required</span>{{ end }}</label>
      <input name="{{ .Name }}" type="{{ .InputType }}" value="{{ .Value }}" required>
      {{ if .Error }}<div class="field-error">{{ .Error }}</div>{{ end }}
    {{ end }}
  {{ end }}
  <button class="btn" type="submit">{{ .CommandName }}</button>
</form>
{{ end }}
