domain: Pizza Ordering

contexts:
  Ordering:
    aggregates:
      Order:
        commands:
          Place Order:
            actor: Customer
            read_models: [Menu & Availability]
            event: Order Placed
          Confirm Order:
            event: Order Confirmed
        policies:
          Confirm Order:
            on: Payment Succeeded
            trigger: Confirm Order

      Inventory:
        commands:
          Reserve Stock:
            event: Stock Reserved
          Release Stock:
            event: Stock Released
        policies:
          Reserve Inventory:
            on: Order Placed
            trigger: Reserve Stock
          Release Inventory:
            on: Payment Failed
            trigger: Release Stock

      Payment:
        commands:
          Process Payment:
            external_systems: [Stripe]
            event: Payment Succeeded
        policies:
          Start Payment:
            on: Order Placed
            trigger: Process Payment
        hotspots:
          - Payment timeouts

  Fulfillment:
    aggregates:
      Kitchen Ticket:
        commands:
          Start Preparation:
            event: Preparation Started
          Mark Ready:
            actor: Cook
            event: Order Ready
          Send Notification:
            external_systems: [SMS Gateway]
            event: Customer Notified
        policies:
          Begin Preparation:
            on: Order Confirmed
            trigger: Start Preparation
          Notify Customer:
            on: Order Ready
            trigger: Send Notification
