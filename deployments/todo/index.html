<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title> — </title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@700&family=Cabin:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cabin', sans-serif; }
    h1, h2, h3 { font-family: 'Roboto Slab', serif; }
  </style>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: { DEFAULT: '#ffe400', dim: '#ffd200', glow: 'rgba(255,228,0,0.15)' },
          surface: { 0: '#111111', 1: '#1a1a1a', 2: '#222222', 3: '#333e48', 4: '#444444' }
        }
      }
    }
  }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    details[open] > div { animation: slideDown 0.2s ease-out; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes blob-drift-1 { 0% { transform: translate(0,0) scale(1); } 50% { transform: translate(-5vw,8vh) scale(0.9); } 100% { transform: translate(0,0) scale(1); } }
    @keyframes blob-drift-2 { 0% { transform: translate(0,0) scale(1); } 50% { transform: translate(7vw,-10vh) scale(0.88); } 100% { transform: translate(0,0) scale(1); } }
    .page-blob {
      position: fixed; border-radius: 50%; filter: blur(100px);
      opacity: 0.06; pointer-events: none; will-change: transform;
    }
  </style>
  <script>
    function submitCmd(form, cmd) {
    const data = {};
    new FormData(form).forEach((v, k) => { if(v) data[k] = v; });
    fetch(form.action, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({command: cmd, attrs: data})
    }).then(r => r.json()).then(r => {
      const el = form.querySelector('.cmd-result');
      el.classList.remove('hidden', 'bg-emerald-900/40', 'text-emerald-300', 'bg-red-900/40', 'text-red-300');
      if (r.ok) {
        el.textContent = '\u2714 Done — ' + (r.event || 'success');
        el.classList.add('bg-emerald-900/40', 'text-emerald-300');
        form.querySelectorAll('input').forEach(i => i.value = '');
        addEvent(r.event, cmd, r.aggregate_type, r.aggregate_id, true);
      } else {
        el.textContent = '\u2718 Error: ' + r.error;
        el.classList.add('bg-red-900/40', 'text-red-300');
        addEvent(r.error, cmd, '', '', false);
      }
    });
    return false;
  }
  function humanize(s) { return s.replace(/([a-z])([A-Z])/g, '$1 $2').replace(/_/g, ' '); }
  function addEvent(event, cmd, aggType, aggId, ok) {
    const stream = document.getElementById('event-stream');
    if (!stream) return;
    const hint = stream.querySelector('p.italic');
    if (hint) hint.remove();
    const time = new Date().toLocaleTimeString();
    const color = ok ? 'border-emerald-600/40' : 'border-red-600/40';
    const icon = ok ? '\u26A1' : '\u274C';
    const card = document.createElement('div');
    card.className = 'p-3 rounded-lg bg-surface-2 border ' + color + ' cursor-pointer hover:bg-surface-3 transition text-xs animate-pulse';
    card.innerHTML = '<div class="flex items-center justify-between mb-1"><span class="font-bold text-brand">' + icon + ' ' + humanize(event||cmd) + '</span><span class="text-gray-600">' + time + '</span></div>' +
      (aggType ? '<p class="text-gray-400">' + humanize(aggType) + (aggId ? ' #' + aggId : '') + '</p>' : '') +
      '<p class="text-gray-500 mt-1">' + humanize(cmd) + '</p>';
    card.onclick = function() {
      card.classList.toggle('ring-1');
      card.classList.toggle('ring-brand/50');
    };
    stream.insertBefore(card, stream.firstChild);
    setTimeout(() => card.classList.remove('animate-pulse'), 1000);
  }
  function toggleCmd(btn) {
    const form = btn.nextElementSibling;
    if (form) form.classList.toggle('hidden');
  }
  function filterByStatus(el, status) {
    const table = (el.closest('[data-domain-aggregate]') || el.parentElement.parentElement).querySelector('table') || document.querySelector('table');
    if (!table) return;
    const rows = table.querySelectorAll('tbody tr'), isActive = el.classList.contains('ring-2');
    el.parentElement.querySelectorAll('span').forEach(s => s.classList.remove('ring-2', 'ring-white'));
    if (isActive) { rows.forEach(r => r.style.display = ''); return; }
    el.classList.add('ring-2', 'ring-white');
    rows.forEach(r => { r.style.display = r.textContent.toLowerCase().includes(status.toLowerCase()) ? '' : 'none'; });
  }
  function showDetail(row) {
    const cells = row.querySelectorAll('td');
    const headers = row.closest('table').querySelectorAll('th');
    let fields = '';
    headers.forEach((h, i) => {
      if (cells[i]) {
        const label = h.textContent;
        const value = cells[i].textContent;
        fields += '<div><label class="block text-xs text-gray-400 mb-1">' + label + '</label><input value="' + value + '" class="w-full bg-surface-0 border border-surface-4 rounded px-3 py-1.5 text-sm text-gray-100"></div>';
      }
    });
    const modal = document.createElement('div');
    modal.className = 'fixed inset-0 bg-black/60 flex items-center justify-center z-50';
    modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
    modal.innerHTML = '<div class="bg-surface-2 rounded-xl p-6 max-w-lg w-full mx-4 border border-surface-3"><h3 class="text-lg font-bold text-brand mb-4">Record Detail</h3><div class="grid grid-cols-2 gap-3">' + fields + '</div><div class="mt-4 flex gap-3"><button onclick="this.closest(\'div.fixed\').remove()" class="px-4 py-1.5 bg-surface-3 rounded text-sm text-brand border border-surface-4">Close</button></div></div>';
    document.body.appendChild(modal);
  }
  function showTab(tab) {
    ['records','build'].forEach(t => {
      document.getElementById('panel-'+t).classList.toggle('hidden', tab !== t);
      const btn = document.getElementById('tab-'+t);
      btn.classList.toggle('text-brand', tab === t);
      btn.classList.toggle('border-brand', tab === t);
      btn.classList.toggle('text-gray-400', tab !== t);
      btn.classList.toggle('border-transparent', tab !== t);
    });
  }
  function searchTable(input) {
    const table = input.closest('div').parentElement.querySelector('table');
    if (!table) return;
    const query = input.value.toLowerCase();
    table.querySelectorAll('tbody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(query) ? '' : 'none';
    });
  }
  function sortTable(th) {
    const table = th.closest('table');
    const idx = Array.from(th.parentElement.children).indexOf(th);
    const rows = Array.from(table.querySelectorAll('tbody tr'));
    const asc = th.dataset.sort !== 'asc';
    rows.sort((a, b) => {
      const va = a.children[idx]?.textContent || '';
      const vb = b.children[idx]?.textContent || '';
      return asc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
    th.dataset.sort = asc ? 'asc' : 'desc';
    const tbody = table.querySelector('tbody');
    rows.forEach(r => tbody.appendChild(r));
    th.parentElement.querySelectorAll('th').forEach(t => t.textContent = t.textContent.replace(/ ▲| ▼/g, ''));
    th.textContent += asc ? ' ▲' : ' ▼';
  }
    function showHelp(btn) {
    const agg = btn.closest('[data-domain-aggregate]');
    const cmd = btn.closest('[data-domain-command]');
    let title = '', body = '';
    if (cmd) {
      const name = cmd.getAttribute('data-domain-command');
      title = humanize(name);
      const desc = cmd.querySelector('p');
      const inputs = cmd.querySelectorAll('input');
      body = '<p class="mb-3">' + (desc ? desc.textContent : 'Execute this action') + '</p>';
      if (inputs.length) {
        body += '<p class="text-xs text-gray-400 mb-2">Required fields:</p><ul class="text-xs text-gray-300 list-disc pl-4">';
        inputs.forEach(i => body += '<li>' + humanize(i.name) + ' (' + (i.placeholder || 'text') + ')</li>');
        body += '</ul>';
      }
    } else if (agg) {
      const name = agg.getAttribute('data-domain-aggregate');
      title = humanize(name);
      const desc = agg.querySelector('p');
      body = '<p class="mb-3">' + (desc ? desc.textContent : 'This module manages ' + humanize(name).toLowerCase()) + '</p>';
      const cmds = agg.querySelectorAll('[data-domain-command]');
      const rows = agg.querySelectorAll('tbody tr');
      body += '<p class="text-xs text-gray-400">Available actions: ' + cmds.length + '</p>';
      body += '<p class="text-xs text-gray-400">Current records: ' + rows.length + '</p>';
    }
    const modal = document.createElement('div');
    modal.className = 'fixed inset-0 bg-black/60 flex items-center justify-center z-50';
    modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
    modal.innerHTML = '<div class="bg-surface-2 rounded-xl p-6 max-w-md w-full mx-4 border border-surface-3">' +
      '<div class="flex items-center justify-between mb-4"><h3 class="text-lg font-bold text-brand">ℹ️ ' + title + '</h3>' +
      '<button onclick="this.closest(\'div.fixed\').remove()" class="text-gray-500 hover:text-white">✕</button></div>' +
      body +
      '<div class="mt-4 p-3 rounded bg-surface-3 border border-surface-4">' +
      '<p class="text-xs text-gray-400 mb-2">Need more help?</p>' +
      '<input placeholder="Ask about ' + title + '..." class="w-full bg-surface-0 border border-surface-4 rounded px-3 py-1.5 text-sm text-gray-100 focus:border-brand focus:outline-none">' +
      '</div></div>';
    document.body.appendChild(modal);
  }
    function openWizard(domain, cmd, fields) {
    const modal = document.createElement('div');
    modal.className = 'fixed inset-0 bg-black/60 flex items-center justify-center z-50';
    modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
    let fieldHtml = '';
    fields.forEach(f => {
      fieldHtml += '<div class="mb-3"><label class="block text-xs text-gray-400 mb-1">' +
        humanize(f.name) + '</label><input name="' + f.name +
        '" type="text" placeholder="' + f.type +
        '" class="w-full bg-surface-0 border border-surface-4 rounded px-3 py-2 text-sm text-gray-100 focus:border-brand focus:outline-none"></div>';
    });
    modal.innerHTML = '<div class="bg-surface-2 rounded-xl p-6 max-w-lg w-full mx-4 border border-surface-3 shadow-2xl">' +
      '<h2 class="text-xl font-bold text-brand mb-4">' + humanize(cmd) + '</h2>' +
      '<form onsubmit="return wizardSubmit(this, \'' + domain + '\', \'' + cmd + '\')">' +
      fieldHtml +
      '<div class="flex gap-3 mt-4">' +
      '<button type="submit" class="px-6 py-2 bg-brand text-surface-0 font-medium rounded-lg hover:bg-brand-dim transition">' + humanize(cmd) + '</button>' +
      '<button type="button" onclick="this.closest(\'div.fixed\').remove()" class="px-4 py-2 bg-surface-3 text-gray-300 rounded-lg hover:bg-surface-4 transition">Cancel</button>' +
      '</div>' +
      '<div class="wizard-result mt-3"></div>' +
      '</form></div>';
    document.body.appendChild(modal);
    modal.querySelector('input')?.focus();
  }
  function wizardSubmit(form, domain, cmd) {
    const data = {};
    new FormData(form).forEach((v, k) => { if(v) data[k] = v; });
    fetch('/domains/' + domain + '/dispatch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({command: cmd, attrs: data})
    }).then(r => r.json()).then(r => {
      const el = form.querySelector('.wizard-result');
      if (r.ok) {
        el.innerHTML = '<div class="p-3 rounded bg-emerald-900/40 text-emerald-300 text-sm">\u2714 ' + humanize(r.event) + ' \u2014 ' + humanize(r.aggregate_type) + ' #' + r.aggregate_id + '</div>';
        addEvent(r.event, cmd, r.aggregate_type, r.aggregate_id, true);
        form.querySelectorAll('input').forEach(i => i.value = '');
        setTimeout(() => form.closest('div.fixed')?.remove(), 1500);
      } else {
        el.innerHTML = '<div class="p-3 rounded bg-red-900/40 text-red-300 text-sm">\u2718 ' + r.error + '</div>';
        addEvent(r.error, cmd, '', '', false);
      }
    });
    return false;
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === ' ' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
      e.preventDefault();
    }
  });
  </script>
</head>

let COUNTER=parseInt(localStorage.getItem('_counter')||'0');
function nextId(p){COUNTER++;localStorage.setItem('_counter',COUNTER.toString());return p+'-'+COUNTER;}
function ld(k){return JSON.parse(localStorage.getItem(k)||'[]');}
function sv(k,v){localStorage.setItem(k,JSON.stringify(v));}


let currentView='all',searchQuery='';

function saveIssue(e){e.preventDefault();const fd=new FormData(e.target),items=ld(SK_ISSUE),id=fd.get('id'),now=new Date().toISOString();
const obj={title:fd.get('title')||null,description:fd.get('description')||null,type:fd.get('type')||null,priority:fd.get('priority')||null,estimate:fd.get('estimate')?parseFloat(fd.get('estimate')):null,assignee_id:fd.get('assignee_id')||null,project_id:fd.get('project_id')||null,cycle_id:fd.get('cycle_id')||null,labels:fd.get('labels')?fd.get('labels').split(',').map(s=>s.trim()).filter(Boolean):[],parent_id:fd.get('parent_id')||null,status:fd.get('status')||null,};
if(id){const it=items.find(i=>i.id===id);if(it){Object.assign(it,obj);it.updated_at=now;}}
else{obj.id=crypto.randomUUID();obj.identifier=nextId('I');obj.created_at=now;obj.updated_at=now;items.unshift(obj);}
sv(SK_ISSUE,items);document.getElementById('issue-dialog').close();toast('Saved');render();}
