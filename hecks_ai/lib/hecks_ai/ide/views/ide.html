<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hecks IDE</title>
  <style>
    :root {
      --bg: #0d1117; --bg-msg: #161b22; --bg-user: #1c2333;
      --border: #30363d; --fg: #c9d1d9; --fg-dim: #8b949e;
      --blue: #58a6ff; --green: #7ee787; --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace;
      --sidebar-w: 280px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: var(--bg); color: var(--fg); overflow: hidden; }

    .layout { display: flex; height: 100vh; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* ── Events sidebar (left) ── */
    .events-sidebar {
      width: 0; border-right: 1px solid var(--border); overflow-y: auto;
      font-family: var(--mono); font-size: 12px; transition: width 0.25s;
      display: none;
    }
    .events-sidebar.open { width: 240px; display: block; }
    .events-header {
      padding: 10px 12px; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--green); font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .event-list { padding: 8px; }
    .event-item {
      padding: 6px 8px; margin-bottom: 4px; border-radius: 4px;
      background: var(--bg-msg); font-size: 11px; line-height: 1.4;
    }
    .event-type { color: var(--green); font-weight: 600; }
    .event-time { color: var(--fg-dim); font-size: 10px; float: right; }
    .event-attrs { color: var(--fg-dim); margin-top: 2px; }
    .event-empty { color: var(--fg-dim); font-style: italic; padding: 12px; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex; border-bottom: 1px solid var(--border); background: var(--bg);
      font-family: var(--mono); font-size: 12px; overflow-x: auto;
    }
    .tab {
      padding: 8px 16px; cursor: pointer; color: var(--fg-dim);
      border-right: 1px solid var(--border); white-space: nowrap;
      display: flex; align-items: center; gap: 6px; user-select: none;
    }
    .tab:hover { color: var(--fg); background: var(--bg-msg); }
    .tab.active { color: var(--fg); background: var(--bg-msg); border-bottom: 2px solid var(--blue); }
    .tab-close { font-size: 14px; color: var(--fg-dim); cursor: pointer; line-height: 1; }
    .tab-close:hover { color: var(--red); }
    .tab-chat { color: var(--green); font-weight: 600; }

    .tab-content { flex: 1; overflow-y: auto; display: none; scroll-behavior: smooth; }
    .tab-content.active { display: block; }

    /* ── File viewer ── */
    .file-view { padding: 16px; font-family: var(--mono); font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
    .file-view-path { color: var(--fg-dim); font-size: 11px; margin-bottom: 12px; }
    .md-view { padding: 16px 24px; font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 15px; line-height: 1.7; max-width: 800px; }
    .md-view h1 { font-size: 24px; margin: 20px 0 12px; color: var(--fg); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .md-view h2 { font-size: 20px; margin: 18px 0 10px; color: var(--fg); }
    .md-view h3 { font-size: 16px; margin: 14px 0 8px; color: var(--fg); }
    .md-view p { margin: 8px 0; }
    .md-view code { background: var(--bg-user); padding: 2px 6px; border-radius: 4px; font-family: var(--mono); font-size: 13px; }
    .md-view pre { background: var(--bg-user); padding: 12px; border-radius: 6px; overflow-x: auto; margin: 10px 0; }
    .md-view pre code { background: none; padding: 0; }
    .md-view ul, .md-view ol { padding-left: 24px; margin: 8px 0; }
    .md-view li { margin: 4px 0; }
    .md-view a { color: var(--blue); }
    .md-view blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--fg-dim); margin: 8px 0; }
    .md-view table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    .md-view th { background: var(--bg-user); color: var(--blue); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; text-align: left; border-bottom: 2px solid var(--blue); }
    .md-view td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .md-view tr:hover td { background: var(--bg-msg); }
    .md-view td code { font-size: 12px; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto;
      font-family: var(--mono); font-size: 12px; transition: width 0.2s;
    }
    .sidebar.collapsed { width: 0; border: none; overflow: hidden; }

    .sidebar-toggle {
      position: fixed; top: 8px; right: 12px; z-index: 10;
      background: var(--bg-msg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--fg-dim); font-family: var(--mono); font-size: 11px;
      padding: 4px 10px; cursor: pointer;
    }
    .sidebar-toggle:hover { color: var(--fg); border-color: var(--blue); }

    /* ── Panel nav dots ── */
    .panel-nav {
      display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid var(--border);
    }
    .panel-dot {
      width: 22px; height: 22px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; cursor: pointer;
      font-size: 11px; transition: opacity 0.2s;
    }
    .panel-dot:hover { opacity: 0.8; }
    .panel-dot.inactive { opacity: 0.3; }
    .panel-dot-ctx { background: var(--blue); color: var(--bg); }
    .panel-dot-tools { background: var(--yellow); color: var(--bg); }

    /* ── Panels ── */
    .panel { border-bottom: 1px solid var(--border); }
    .panel.hidden { display: none; }
    .panel-head {
      padding: 8px 14px; cursor: pointer; user-select: none;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
    }
    .panel-head:hover { background: var(--bg-msg); }
    .panel-actions { display: flex; gap: 6px; align-items: center; }
    .panel-chevron { transition: transform 0.15s; font-size: 9px; cursor: pointer; }
    .panel.closed .panel-chevron { transform: rotate(-90deg); }
    .panel-body { transition: max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease; max-height: 500px; opacity: 1; overflow: hidden; }
    .panel.closed .panel-body { max-height: 0; opacity: 0; padding-top: 0; padding-bottom: 0; }
    .panel-body { padding: 4px 14px 12px; line-height: 1.8; overflow-y: auto; }
    .panel-count { font-size: 9px; background: var(--border); color: var(--fg); border-radius: 8px; padding: 1px 6px; margin-left: 6px; }

    .panel-ctx .panel-head { color: var(--blue); }
    .panel-tools .panel-head { color: var(--yellow); }

    .ctx-branch { color: var(--green); font-weight: 600; }
    .ctx-story { color: var(--yellow); }
    .ctx-link { display: block; color: var(--fg); text-decoration: none; padding: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    .ctx-link:hover { color: var(--blue); }
    .ctx-link.active, .book-app-name.active { background: var(--bg-user); border-radius: 4px; }
    .ctx-link-label { color: var(--fg-dim); font-size: 10px; margin-left: 4px; }
    .ctx-section { margin-top: 10px; color: var(--fg-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }

    .tool-entry { padding: 6px 8px; margin-bottom: 4px; border-radius: 4px; background: #1a1e2a; font-size: 11px; line-height: 1.4; }
    .tool-name { color: var(--yellow); font-weight: 600; }
    .tool-input { color: var(--fg-dim); margin-top: 2px; max-height: 40px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .tool-empty { color: var(--fg-dim); font-style: italic; }

    .panel-apps .panel-head { color: var(--red); }
    .panel-dot-apps { background: var(--red); color: var(--bg); }
    .panel-dot-hex { background: var(--purple); color: var(--bg); }
    .panel-dot-docs { background: var(--green); color: var(--bg); }
    .panel-docs .panel-head { color: var(--green); }

    .book-app { margin-bottom: 6px; }
    .book-app-name { color: var(--fg); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 2px 0; }
    .book-app-name:hover { color: var(--red); }
    .book-app-type { font-size: 9px; color: var(--fg-dim); background: var(--border); border-radius: 4px; padding: 0 4px; }
    .book-aggs { padding-left: 14px; }
    .book-aggs.collapsed { display: none; }
    .book-agg { color: var(--fg-dim); padding: 1px 0; cursor: pointer; }
    .book-agg:hover { color: var(--fg); }
    .book-chevron { font-size: 8px; transition: transform 0.15s; }
    .book-chevron.open { transform: rotate(90deg); }
    .book-hex-link { color: var(--purple); cursor: pointer; font-size: 10px; margin-left: 8px; }
    .book-hex-link:hover { text-decoration: underline; }

    /* ── Workshop ── */
    .ws-diagram { padding: 16px; text-align: center; border-bottom: 1px solid var(--border); }
    .ws-diagram-title { font-family: var(--mono); font-size: 13px; color: var(--green); font-weight: 600; margin-bottom: 12px; }
    .ws-diagram svg { max-width: 100%; }
    .mermaid-pending { visibility: hidden; }
    .ws-output { padding: 16px; font-family: var(--mono); font-size: 13px; line-height: 1.6; }
    .ws-entry { margin-bottom: 12px; }
    .ws-cmd { color: var(--green); }
    .ws-cmd::before { content: '> '; color: var(--fg-dim); }
    .ws-result { white-space: pre-wrap; word-wrap: break-word; margin-top: 4px; }
    .ws-error { color: var(--red); }
    .ws-mode { color: var(--fg-dim); font-size: 11px; }

    .input-area { position: relative; }
    .input-area .awesomplete { flex: 1; display: flex; }
    .input-area .awesomplete input { flex: 1; }
    .awesomplete > ul { bottom: 100% !important; top: auto !important; margin-bottom: 4px; }
    .awesomplete .visually-hidden { position: absolute; clip: rect(0,0,0,0); height: 1px; width: 1px; overflow: hidden; }

    /* ── Messages ── */
    .messages { padding: 16px; }
    .turn { margin-bottom: 20px; }
    .turn-label { font-family: var(--mono); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .turn-user .turn-label { color: var(--blue); }
    .turn-assistant .turn-label { color: var(--green); }
    .turn-system .turn-label { color: var(--fg-dim); }
    .turn-body { font-family: var(--mono); font-size: 14px; line-height: 1.6; padding: 10px 14px; border-radius: 8px; }
    .turn-user .turn-body { background: var(--bg-user); border-left: 3px solid var(--blue); }
    .turn-user.thinking .turn-body {
      background: linear-gradient(90deg, var(--bg-user) 0%, #253a5e 30%, #2d4a7a 50%, #253a5e 70%, var(--bg-user) 100%);
      background-size: 300% 100%; animation: shimmer-msg 2s ease-in-out infinite;
      border-left-color: #79c0ff; box-shadow: 0 0 12px rgba(88, 166, 255, 0.2);
    }
    @keyframes shimmer-msg { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    .turn-assistant .turn-body { background: var(--bg-msg); }
    .turn-system .turn-body { background: transparent; color: var(--fg-dim); font-size: 12px; }
    .turn-body pre { white-space: pre-wrap; word-wrap: break-word; margin: 0; }

    /* ── Input ── */
    .input-area { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .input-area input {
      flex: 1; background: var(--bg-msg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--fg); padding: 10px 14px; font-family: var(--mono); font-size: 14px; outline: none;
    }
    .input-area input:focus { border-color: var(--blue); }
    .input-area input::placeholder { color: var(--fg-dim); }
    .input-area button { background: #238636; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; font-family: var(--mono); }
    .input-area button:hover { background: #2ea043; }
    .input-area button:disabled { opacity: 0.4; cursor: default; }
    .esc-hint { font-size: 11px; color: var(--fg-dim); }
    .hidden { display: none; }

    .command-log {
      max-height: 80px; overflow-y: auto; border-top: 1px solid var(--border);
      font-family: var(--mono); font-size: 10px; line-height: 1.6;
      padding: 0 16px; scroll-behavior: smooth;
    }
    .command-log:empty { display: none; }
    .command-log.collapsed { max-height: 0; padding: 0; border: none; overflow: hidden; }
    .command-log-toggle {
      font-family: var(--mono); font-size: 9px; color: var(--fg-dim); cursor: pointer;
      padding: 2px 16px; border-top: 1px solid var(--border); user-select: none;
    }
    .command-log-toggle:hover { color: var(--fg); }
    .command-log-toggle.open { color: var(--yellow); }
    .cmd-entry { display: flex; gap: 8px; padding: 1px 0; }
    .cmd-source { color: var(--fg-dim); min-width: 50px; }
    .cmd-source.server { color: var(--yellow); }
    .cmd-source.client { color: var(--blue); }
    .cmd-event { color: var(--fg); }
    .cmd-time { color: var(--fg-dim); margin-left: auto; }
    .cmd-error { color: var(--red); cursor: pointer; }
    .cmd-screenshot { cursor: pointer; opacity: 0.6; }
    .cmd-screenshot:hover { opacity: 1; }
    .cmd-errors { padding: 2px 0 2px 58px; }
    .cmd-errors.hidden { display: none; }
    .cmd-error-line { color: var(--red); font-size: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .thinking-bar { height: 3px; opacity: 0; transition: opacity 0.5s; overflow: hidden; }
    .thinking-bar.active { opacity: 1; }
    .thinking-bar-inner {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, transparent 0%, #0a3d91 10%, #1a6dff 20%, #3b8bff 30%, #58a6ff 40%, #79c0ff 48%, #a5d8ff 50%, #79c0ff 52%, #58a6ff 60%, #3b8bff 70%, #1a6dff 80%, #0a3d91 90%, transparent 100%);
      background-size: 200% 100%; animation: thinking-shimmer 3s ease-in-out infinite;
      box-shadow: 0 0 12px rgba(88, 166, 255, 0.6), 0 0 4px rgba(121, 192, 255, 0.4);
    }
    @keyframes thinking-shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
  </style>
</head>
<body>
  <div class="layout">
    <div class="events-sidebar" id="events-sidebar">
      <div class="events-header">Events</div>
      <div class="event-list" id="event-list">
        <div class="event-empty">Enter play! to see events.</div>
      </div>
    </div>
    <div class="main">
      <div class="tab-bar" id="tab-bar">
        <div class="tab tab-chat active" data-tab="chat" onclick="switchTab('chat')">Chat</div>
      </div>
      <div class="tab-content active" id="tab-chat">
        <div class="messages" id="messages"></div>
      </div>
      <div class="command-log-toggle" id="command-log-toggle" onclick="IDE.bus.emit('command-log:toggle')">&#9654; IDE commands log</div>
      <div class="command-log collapsed" id="command-log"></div>
      <div class="thinking-bar" id="thinking-bar"><div class="thinking-bar-inner"></div></div>
      <div class="input-area">
        <input id="prompt" type="text" placeholder="Type a message..." autofocus>
        <button id="send" onclick="sendPrompt()">Send</button>
        <span class="esc-hint hidden" id="esc-hint">esc to cancel</span>
        <span id="status"></span>
      </div>
    </div>
    <div class="sidebar" id="sidebar">
      <div class="panel-nav" id="panel-nav">
        <div class="panel-dot panel-dot-apps" onclick="toggleDotPanel('apps')" title="Applications">A</div>
        <div class="panel-dot panel-dot-hex inactive" onclick="toggleDotPanel('hex')" title="Hecksagon">H</div>
        <div class="panel-dot panel-dot-docs" onclick="toggleDotPanel('docs-panel')" title="Documentation">D</div>
        <div class="panel-dot panel-dot-tools" onclick="toggleDotPanel('tools')" title="Tool Calls">T</div>
      </div>
      <div class="panel panel-apps" id="panel-apps">
        <div class="panel-head">
          <span onclick="collapsePanel('apps')">Applications <span class="panel-chevron">&#9660;</span></span>
                  </div>
        <div class="panel-body" id="apps-body">Loading...</div>
      </div>
      <div class="panel panel-hex hidden" id="panel-hex">
        <div class="panel-head">
          <span onclick="collapsePanel('hex')">Hecksagon <span class="panel-chevron">&#9660;</span></span>
        </div>
        <div class="panel-body" id="hex-body"></div>
      </div>
      <div class="panel panel-docs" id="panel-docs-panel">
        <div class="panel-head">
          <span onclick="collapsePanel('docs-panel')">Documentation <span class="panel-chevron">&#9660;</span></span>
        </div>
        <div class="panel-body" id="docs-body"><span style="color:var(--fg-dim);font-style:italic">Loading...</span></div>
      </div>
      <div class="panel panel-tools" id="panel-tools">
        <div class="panel-head">
          <span onclick="collapsePanel('tools')">Tool Calls <span class="panel-count" id="tool-count">0</span> <span class="panel-chevron">&#9660;</span></span>
                  </div>
        <div class="panel-body" id="tool-log"><div class="tool-empty">No tool calls yet.</div></div>
      </div>
    </div>
  </div>
  <button class="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/awesomplete@1.1.5/awesomplete.css">
  <script src="https://cdn.jsdelivr.net/npm/awesomplete@1.1.5/awesomplete.min.js"></script>
  <style>
    .awesomplete > ul { background: var(--bg-msg); border: 1px solid var(--border); border-radius: 6px; color: var(--fg); font-family: var(--mono); font-size: 13px; }
    .awesomplete > ul > li { padding: 4px 12px; }
    .awesomplete > ul > li:hover, .awesomplete > ul > li[aria-selected="true"] { background: var(--bg-user); color: var(--blue); }
    .awesomplete mark { background: none; color: var(--blue); font-weight: 600; }
  </style>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });
    window.renderMermaid = async function() {
      const els = document.querySelectorAll('.mermaid-pending');
      for (const el of els) {
        const id = 'mm-' + Math.random().toString(36).slice(2);
        const { svg } = await mermaid.render(id, el.textContent);
        el.innerHTML = svg;
        el.classList.remove('mermaid-pending');
        el.classList.add('mermaid-rendered');
      }
    };
  </script>

  <script src="/ide.js"></script>
</body>
</html>
