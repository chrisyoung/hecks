<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hecks IDE</title>
  <style>
    :root {
      --bg: #0d1117; --bg-msg: #161b22; --bg-user: #1c2333;
      --border: #30363d; --fg: #c9d1d9; --fg-dim: #8b949e;
      --blue: #58a6ff; --green: #7ee787; --yellow: #d29922; --red: #f85149;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: var(--bg); color: var(--fg); overflow: hidden; }

    .app { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      font-family: var(--mono); font-size: 13px; color: var(--fg-dim);
      display: flex; justify-content: space-between; align-items: center;
    }
    .header-title { color: var(--green); font-weight: 600; }

    /* ── Messages ── */
    .messages { flex: 1; overflow-y: auto; padding: 16px; }

    .turn { margin-bottom: 20px; }
    .turn-label {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .turn-user .turn-label { color: var(--blue); }
    .turn-assistant .turn-label { color: var(--green); }
    .turn-system .turn-label { color: var(--fg-dim); }
    .turn-tool .turn-label { color: var(--yellow); }

    .turn-body {
      font-family: var(--mono); font-size: 14px; line-height: 1.6;
      padding: 10px 14px; border-radius: 8px;
    }
    .turn-user .turn-body { background: var(--bg-user); border-left: 3px solid var(--blue); }
    .turn-assistant .turn-body { background: var(--bg-msg); }
    .turn-system .turn-body { background: transparent; color: var(--fg-dim); font-size: 12px; }
    .turn-tool .turn-body {
      background: #1a1e2a; border-left: 3px solid var(--yellow);
      font-size: 12px; color: var(--fg-dim);
    }

    .turn-body pre { white-space: pre-wrap; word-wrap: break-word; margin: 0; }
    .tool-name { color: var(--yellow); font-weight: 600; }

    /* ── Input ── */
    .input-area {
      padding: 12px 16px; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .input-area input {
      flex: 1; background: var(--bg-msg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--fg); padding: 10px 14px;
      font-family: var(--mono); font-size: 14px; outline: none;
    }
    .input-area input:focus { border-color: var(--blue); }
    .input-area input::placeholder { color: var(--fg-dim); }
    .input-area button {
      background: #238636; color: #fff; border: none; border-radius: 8px;
      padding: 10px 20px; font-size: 14px; cursor: pointer;
      font-family: var(--mono);
    }
    .input-area button:hover { background: #2ea043; }
    .input-area button:disabled { opacity: 0.4; cursor: default; }
    .esc-hint { font-size: 11px; color: var(--fg-dim); }
    .hidden { display: none; }

    /* ── Thinking indicator ── */
    .thinking-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <span class="header-title">hecks ide</span>
      <span id="status"></span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input id="prompt" type="text" placeholder="Type a message..." autofocus>
      <button id="send" onclick="sendPrompt()">Send</button>
      <span class="esc-hint hidden" id="esc-hint">esc to cancel</span>
    </div>
  </div>

  <script>
    const msgsEl = document.getElementById('messages');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const escHint = document.getElementById('esc-hint');
    let nextIndex = 0, busy = false, curEl = null;

    promptEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); }
    });

    document.addEventListener('keydown', async e => {
      if (e.key === 'Escape' && busy) {
        await fetch('/interrupt', { method: 'POST' });
        done('interrupted');
      }
    });

    async function sendPrompt() {
      const text = promptEl.value.trim();
      if (!text || busy) return;
      promptEl.value = '';
      addTurn('user', text);
      curEl = null;
      busy = true;
      sendBtn.disabled = true;
      escHint.classList.remove('hidden');
      statusEl.innerHTML = '<span class="thinking-dot"></span>';
      await fetch('/prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: text })
      });
    }

    function done(label) {
      busy = false;
      sendBtn.disabled = false;
      escHint.classList.add('hidden');
      statusEl.textContent = label || '';
      curEl = null;
      promptEl.focus();
    }

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function addTurn(role, content) {
      const labels = { user: 'You', assistant: 'Claude', system: 'System', tool: 'Tool' };
      const d = document.createElement('div');
      d.className = `turn turn-${role}`;
      d.innerHTML = `<div class="turn-label">${labels[role] || role}</div><div class="turn-body"><pre>${esc(content)}</pre></div>`;
      msgsEl.appendChild(d);
      msgsEl.scrollTop = msgsEl.scrollHeight;
      return d;
    }

    function addToolTurn(name, input) {
      const d = document.createElement('div');
      d.className = 'turn turn-tool';
      const inputStr = typeof input === 'string' ? input : JSON.stringify(input);
      d.innerHTML = `<div class="turn-label">Tool</div><div class="turn-body"><span class="tool-name">${esc(name)}</span><pre>${esc(inputStr.slice(0, 400))}</pre></div>`;
      msgsEl.appendChild(d);
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    function appendAssistant(text) {
      if (!curEl) curEl = addTurn('assistant', '');
      curEl.querySelector('pre').textContent += text;
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    function handleEvent(raw) {
      try {
        const e = JSON.parse(raw);
        if (e.type === 'assistant' && e.message?.content) {
          e.message.content.forEach(c => {
            if (c.type === 'text') appendAssistant(c.text);
            if (c.type === 'tool_use') addToolTurn(c.name, c.input);
          });
        } else if (e.type === 'result' && e.subtype === 'success') {
          done();
        } else if (e.type === 'result' && e.subtype === 'done') {
          done();
        } else if (e.type === 'error') {
          addTurn('system', e.message || 'Unknown error');
          done();
        }
      } catch (err) {}
    }

    async function poll() {
      try {
        const r = await fetch(`/events?after=${nextIndex}`);
        const d = await r.json();
        d.events.forEach(handleEvent);
        nextIndex = d.next_index;
      } catch (e) {}
    }
    setInterval(poll, 250);
  </script>
</body>
</html>
