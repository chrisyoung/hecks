<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hecks IDE</title>
  <style>
    :root {
      --bg: #0d1117; --bg-msg: #161b22; --bg-user: #1c2333;
      --border: #30363d; --fg: #c9d1d9; --fg-dim: #8b949e;
      --blue: #58a6ff; --green: #7ee787; --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace;
      --sidebar-w: 280px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: var(--bg); color: var(--fg); overflow: hidden; }

    .layout { display: flex; height: 100vh; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* ── Events sidebar (left) ── */
    .events-sidebar {
      width: 0; border-right: 1px solid var(--border); overflow-y: auto;
      font-family: var(--mono); font-size: 12px; transition: width 0.25s;
      display: none;
    }
    .events-sidebar.open { width: 240px; display: block; }
    .events-header {
      padding: 10px 12px; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--green); font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .event-list { padding: 8px; }
    .event-item {
      padding: 6px 8px; margin-bottom: 4px; border-radius: 4px;
      background: var(--bg-msg); font-size: 11px; line-height: 1.4;
    }
    .event-type { color: var(--green); font-weight: 600; }
    .event-time { color: var(--fg-dim); font-size: 10px; float: right; }
    .event-attrs { color: var(--fg-dim); margin-top: 2px; }
    .event-empty { color: var(--fg-dim); font-style: italic; padding: 12px; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex; border-bottom: 1px solid var(--border); background: var(--bg);
      font-family: var(--mono); font-size: 12px; overflow-x: auto;
    }
    .tab {
      padding: 8px 16px; cursor: pointer; color: var(--fg-dim);
      border-right: 1px solid var(--border); white-space: nowrap;
      display: flex; align-items: center; gap: 6px; user-select: none;
    }
    .tab:hover { color: var(--fg); background: var(--bg-msg); }
    .tab.active { color: var(--fg); background: var(--bg-msg); border-bottom: 2px solid var(--blue); }
    .tab-close { font-size: 14px; color: var(--fg-dim); cursor: pointer; line-height: 1; }
    .tab-close:hover { color: var(--red); }
    .tab-chat { color: var(--green); font-weight: 600; }

    .tab-content { flex: 1; overflow-y: auto; display: none; scroll-behavior: smooth; }
    .tab-content.active { display: block; }

    /* ── File viewer ── */
    .file-view { padding: 16px; font-family: var(--mono); font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
    .file-view-path { color: var(--fg-dim); font-size: 11px; margin-bottom: 12px; }
    .md-view { padding: 16px 24px; font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 15px; line-height: 1.7; max-width: 800px; }
    .md-view h1 { font-size: 24px; margin: 20px 0 12px; color: var(--fg); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .md-view h2 { font-size: 20px; margin: 18px 0 10px; color: var(--fg); }
    .md-view h3 { font-size: 16px; margin: 14px 0 8px; color: var(--fg); }
    .md-view p { margin: 8px 0; }
    .md-view code { background: var(--bg-user); padding: 2px 6px; border-radius: 4px; font-family: var(--mono); font-size: 13px; }
    .md-view pre { background: var(--bg-user); padding: 12px; border-radius: 6px; overflow-x: auto; margin: 10px 0; }
    .md-view pre code { background: none; padding: 0; }
    .md-view ul, .md-view ol { padding-left: 24px; margin: 8px 0; }
    .md-view li { margin: 4px 0; }
    .md-view a { color: var(--blue); }
    .md-view blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--fg-dim); margin: 8px 0; }
    .md-view table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    .md-view th { background: var(--bg-user); color: var(--blue); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; text-align: left; border-bottom: 2px solid var(--blue); }
    .md-view td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .md-view tr:hover td { background: var(--bg-msg); }
    .md-view td code { font-size: 12px; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto;
      font-family: var(--mono); font-size: 12px; transition: width 0.2s;
    }
    .sidebar.collapsed { width: 0; border: none; overflow: hidden; }

    .sidebar-toggle {
      position: fixed; top: 8px; right: 12px; z-index: 10;
      background: var(--bg-msg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--fg-dim); font-family: var(--mono); font-size: 11px;
      padding: 4px 10px; cursor: pointer;
    }
    .sidebar-toggle:hover { color: var(--fg); border-color: var(--blue); }

    /* ── Panel nav dots ── */
    .panel-nav {
      display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid var(--border);
    }
    .panel-dot {
      width: 22px; height: 22px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; cursor: pointer;
      font-size: 11px; transition: opacity 0.2s;
    }
    .panel-dot:hover { opacity: 0.8; }
    .panel-dot.inactive { opacity: 0.3; }
    .panel-dot-ctx { background: var(--blue); color: var(--bg); }
    .panel-dot-tools { background: var(--yellow); color: var(--bg); }

    /* ── Panels ── */
    .panel { border-bottom: 1px solid var(--border); }
    .panel.hidden { display: none; }
    .panel-head {
      padding: 8px 14px; cursor: pointer; user-select: none;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
    }
    .panel-head:hover { background: var(--bg-msg); }
    .panel-actions { display: flex; gap: 6px; align-items: center; }
    .panel-chevron { transition: transform 0.15s; font-size: 9px; cursor: pointer; }
    .panel.closed .panel-chevron { transform: rotate(-90deg); }
    .panel-body { transition: max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease; max-height: 500px; opacity: 1; overflow: hidden; }
    .panel.closed .panel-body { max-height: 0; opacity: 0; padding-top: 0; padding-bottom: 0; }
    .panel-body { padding: 4px 14px 12px; line-height: 1.8; overflow-y: auto; }
    .panel-count { font-size: 9px; background: var(--border); color: var(--fg); border-radius: 8px; padding: 1px 6px; margin-left: 6px; }

    .panel-ctx .panel-head { color: var(--blue); }
    .panel-tools .panel-head { color: var(--yellow); }

    .ctx-branch { color: var(--green); font-weight: 600; }
    .ctx-story { color: var(--yellow); }
    .ctx-link { display: block; color: var(--fg); text-decoration: none; padding: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    .ctx-link:hover { color: var(--blue); }
    .ctx-link.active, .book-app-name.active { background: var(--bg-user); border-radius: 4px; }
    .ctx-link-label { color: var(--fg-dim); font-size: 10px; margin-left: 4px; }
    .ctx-section { margin-top: 10px; color: var(--fg-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }

    .tool-entry { padding: 6px 8px; margin-bottom: 4px; border-radius: 4px; background: #1a1e2a; font-size: 11px; line-height: 1.4; }
    .tool-name { color: var(--yellow); font-weight: 600; }
    .tool-input { color: var(--fg-dim); margin-top: 2px; max-height: 40px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .tool-empty { color: var(--fg-dim); font-style: italic; }

    .panel-apps .panel-head { color: var(--red); }
    .panel-dot-apps { background: var(--red); color: var(--bg); }
    .panel-dot-hex { background: var(--purple); color: var(--bg); }

    .book-app { margin-bottom: 6px; }
    .book-app-name { color: var(--fg); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 2px 0; }
    .book-app-name:hover { color: var(--red); }
    .book-app-type { font-size: 9px; color: var(--fg-dim); background: var(--border); border-radius: 4px; padding: 0 4px; }
    .book-aggs { padding-left: 14px; }
    .book-aggs.collapsed { display: none; }
    .book-agg { color: var(--fg-dim); padding: 1px 0; cursor: pointer; }
    .book-agg:hover { color: var(--fg); }
    .book-chevron { font-size: 8px; transition: transform 0.15s; }
    .book-chevron.open { transform: rotate(90deg); }
    .book-hex-link { color: var(--purple); cursor: pointer; font-size: 10px; margin-left: 8px; }
    .book-hex-link:hover { text-decoration: underline; }

    /* ── Workshop ── */
    .ws-diagram { padding: 16px; text-align: center; border-bottom: 1px solid var(--border); }
    .ws-diagram-title { font-family: var(--mono); font-size: 13px; color: var(--green); font-weight: 600; margin-bottom: 12px; }
    .ws-diagram svg { max-width: 100%; }
    .mermaid-pending { visibility: hidden; }
    .ws-output { padding: 16px; font-family: var(--mono); font-size: 13px; line-height: 1.6; }
    .ws-entry { margin-bottom: 12px; }
    .ws-cmd { color: var(--green); }
    .ws-cmd::before { content: '> '; color: var(--fg-dim); }
    .ws-result { white-space: pre-wrap; word-wrap: break-word; margin-top: 4px; }
    .ws-error { color: var(--red); }
    .ws-mode { color: var(--fg-dim); font-size: 11px; }

    .input-area { position: relative; }
    .input-area .awesomplete { flex: 1; display: flex; }
    .input-area .awesomplete input { flex: 1; }
    .awesomplete > ul { bottom: 100% !important; top: auto !important; margin-bottom: 4px; }
    .awesomplete .visually-hidden { position: absolute; clip: rect(0,0,0,0); height: 1px; width: 1px; overflow: hidden; }

    /* ── Messages ── */
    .messages { padding: 16px; }
    .turn { margin-bottom: 20px; }
    .turn-label { font-family: var(--mono); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .turn-user .turn-label { color: var(--blue); }
    .turn-assistant .turn-label { color: var(--green); }
    .turn-system .turn-label { color: var(--fg-dim); }
    .turn-body { font-family: var(--mono); font-size: 14px; line-height: 1.6; padding: 10px 14px; border-radius: 8px; }
    .turn-user .turn-body { background: var(--bg-user); border-left: 3px solid var(--blue); }
    .turn-user.thinking .turn-body {
      background: linear-gradient(90deg, var(--bg-user) 0%, #253a5e 30%, #2d4a7a 50%, #253a5e 70%, var(--bg-user) 100%);
      background-size: 300% 100%; animation: shimmer-msg 2s ease-in-out infinite;
      border-left-color: #79c0ff; box-shadow: 0 0 12px rgba(88, 166, 255, 0.2);
    }
    @keyframes shimmer-msg { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    .turn-assistant .turn-body { background: var(--bg-msg); }
    .turn-system .turn-body { background: transparent; color: var(--fg-dim); font-size: 12px; }
    .turn-body pre { white-space: pre-wrap; word-wrap: break-word; margin: 0; }

    /* ── Input ── */
    .input-area { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .input-area input {
      flex: 1; background: var(--bg-msg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--fg); padding: 10px 14px; font-family: var(--mono); font-size: 14px; outline: none;
    }
    .input-area input:focus { border-color: var(--blue); }
    .input-area input::placeholder { color: var(--fg-dim); }
    .input-area button { background: #238636; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; font-family: var(--mono); }
    .input-area button:hover { background: #2ea043; }
    .input-area button:disabled { opacity: 0.4; cursor: default; }
    .esc-hint { font-size: 11px; color: var(--fg-dim); }
    .hidden { display: none; }

    .thinking-bar { height: 3px; opacity: 0; transition: opacity 0.5s; overflow: hidden; }
    .thinking-bar.active { opacity: 1; }
    .thinking-bar-inner {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, transparent 0%, #0a3d91 10%, #1a6dff 20%, #3b8bff 30%, #58a6ff 40%, #79c0ff 48%, #a5d8ff 50%, #79c0ff 52%, #58a6ff 60%, #3b8bff 70%, #1a6dff 80%, #0a3d91 90%, transparent 100%);
      background-size: 200% 100%; animation: thinking-shimmer 3s ease-in-out infinite;
      box-shadow: 0 0 12px rgba(88, 166, 255, 0.6), 0 0 4px rgba(121, 192, 255, 0.4);
    }
    @keyframes thinking-shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
  </style>
</head>
<body>
  <div class="layout">
    <div class="events-sidebar" id="events-sidebar">
      <div class="events-header">Events</div>
      <div class="event-list" id="event-list">
        <div class="event-empty">Enter play! to see events.</div>
      </div>
    </div>
    <div class="main">
      <div class="tab-bar" id="tab-bar">
        <div class="tab tab-chat active" data-tab="chat" onclick="switchTab('chat')">Chat</div>
      </div>
      <div class="tab-content active" id="tab-chat">
        <div class="messages" id="messages"></div>
      </div>
      <div class="thinking-bar" id="thinking-bar"><div class="thinking-bar-inner"></div></div>
      <div class="input-area">
        <input id="prompt" type="text" placeholder="Type a message..." autofocus>
        <button id="send" onclick="sendPrompt()">Send</button>
        <span class="esc-hint hidden" id="esc-hint">esc to cancel</span>
        <span id="status"></span>
      </div>
    </div>
    <div class="sidebar" id="sidebar">
      <div class="panel-nav" id="panel-nav">
        <div class="panel-dot panel-dot-apps" onclick="toggleDotPanel('apps')" title="Applications">A</div>
        <div class="panel-dot panel-dot-hex inactive" onclick="toggleDotPanel('hex')" title="Hecksagon">H</div>
        <div class="panel-dot panel-dot-tools" onclick="toggleDotPanel('tools')" title="Tool Calls">T</div>
      </div>
      <div class="panel panel-apps" id="panel-apps">
        <div class="panel-head">
          <span onclick="collapsePanel('apps')">Applications <span class="panel-chevron">&#9660;</span></span>
                  </div>
        <div class="panel-body" id="apps-body">Loading...</div>
      </div>
      <div class="panel panel-hex hidden" id="panel-hex">
        <div class="panel-head">
          <span onclick="collapsePanel('hex')">Hecksagon <span class="panel-chevron">&#9660;</span></span>
        </div>
        <div class="panel-body" id="hex-body"></div>
      </div>
      <div class="panel panel-tools" id="panel-tools">
        <div class="panel-head">
          <span onclick="collapsePanel('tools')">Tool Calls <span class="panel-count" id="tool-count">0</span> <span class="panel-chevron">&#9660;</span></span>
                  </div>
        <div class="panel-body" id="tool-log"><div class="tool-empty">No tool calls yet.</div></div>
      </div>
    </div>
  </div>
  <button class="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/awesomplete@1.1.5/awesomplete.css">
  <script src="https://cdn.jsdelivr.net/npm/awesomplete@1.1.5/awesomplete.min.js"></script>
  <style>
    /* Override awesomplete for dark theme */
    .awesomplete > ul { background: var(--bg-msg); border: 1px solid var(--border); border-radius: 6px; color: var(--fg); font-family: var(--mono); font-size: 13px; }
    .awesomplete > ul > li { padding: 4px 12px; }
    .awesomplete > ul > li:hover, .awesomplete > ul > li[aria-selected="true"] { background: var(--bg-user); color: var(--blue); }
    .awesomplete mark { background: none; color: var(--blue); font-weight: 600; }
  </style>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });
    window.renderMermaid = async function() {
      const els = document.querySelectorAll('.mermaid-pending');
      for (const el of els) {
        const id = 'mm-' + Math.random().toString(36).slice(2);
        const { svg } = await mermaid.render(id, el.textContent);
        el.innerHTML = svg;
        el.classList.remove('mermaid-pending');
        el.classList.add('mermaid-rendered');
      }
    };
  </script>

  <script>
    /* ── Error + Console streaming ── */
    window.onerror = function(msg, src, line, col, err) {
      fetch('/console', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ level: 'error', message: `${msg} at ${src}:${line}:${col}` })
      }).catch(() => {});
    };
    ['error', 'warn', 'log'].forEach(level => {
      const orig = console[level];
      console[level] = function(...args) {
        orig.apply(console, args);
        const msg = args.map(a => typeof a === 'string' ? a : JSON.stringify(a)).join(' ');
        fetch('/console', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ level, message: msg.slice(0, 1000) })
        }).catch(() => {});
      };
    });

    const msgsEl = document.getElementById('messages');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const escHint = document.getElementById('esc-hint');
    const sidebar = document.getElementById('sidebar');
    const tabBar = document.getElementById('tab-bar');
    const thinkingBar = document.getElementById('thinking-bar');
    const toolLogEl = document.getElementById('tool-log');
    const toolCountEl = document.getElementById('tool-count');
    let nextIndex = 0, busy = false, curEl = null, lastUserEl = null, toolCount = 0;
    const openTabs = {};
    let activeFileCtx = null; // the file open in a tab, used as context for prompts

    /* ── Command Bus ── */
    const bus = { _subs: {}, on(evt, fn) { (this._subs[evt] ||= []).push(fn); }, emit(evt, data) { (this._subs[evt] || []).forEach(fn => fn(data)); } };

    /* ── Screenshot subscriber ── */
    (function() {
      let timer = null, count = 0;
      function burst() {
        clearInterval(timer); count = 0;
        timer = setInterval(async () => {
          try {
            const canvas = await html2canvas(document.body, { backgroundColor: '#0d1117', scale: 0.5, logging: false });
            const data = canvas.toDataURL('image/png').split(',')[1];
            fetch('/screenshot', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data }) });
          } catch (e) {}
          if (++count >= 3) clearInterval(timer);
        }, 1000);
      }
      ['file:open','tab:switch','sidebar:toggle','panel:toggle','prompt:send','prompt:done','prompt:interrupt'].forEach(e => bus.on(e, burst));
      setInterval(burst, 5000);
    })();

    /* ── Sidebar panels ── */
    function highlightSidebarItem(el) {
      sidebar.querySelectorAll('.active').forEach(a => a.classList.remove('active'));
      if (el) el.classList.add('active');
    }

    sidebar.addEventListener('click', (e) => {
      const link = e.target.closest('.ctx-link, .book-app-name');
      if (link) highlightSidebarItem(link);
    });

    function toggleSidebar() { sidebar.classList.toggle('collapsed'); bus.emit('sidebar:toggle'); }

    function collapsePanel(name) {
      document.getElementById('panel-' + name).classList.toggle('closed');
      syncDot(name);
      bus.emit('panel:toggle', name);
    }

    function toggleDotPanel(name) {
      const el = document.getElementById('panel-' + name);
      el.classList.toggle('closed');
      syncDot(name);
      bus.emit('panel:toggle', name);
    }

    function showPanel(name) {
      const el = document.getElementById('panel-' + name);
      el.classList.remove('hidden', 'closed');
      syncDot(name);
    }

    function syncDot(name) {
      const el = document.getElementById('panel-' + name);
      const dot = document.querySelector('.panel-dot-' + name);
      if (dot) dot.classList.toggle('inactive', el.classList.contains('closed'));
    }

    /* ── Tabs ── */
    function switchTab(id) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + id));
      // Track file context — if viewing a file, prompts reference it
      const tab = openTabs[id];
      activeFileCtx = (tab && id !== 'chat') ? tab.path : null;
      if (id === 'chat') promptEl.focus();
      bus.emit('tab:switch', id);
    }

    async function openFile(path, opts) {
      const isDoc = opts?.doc || path.startsWith('docs/');
      const id = isDoc ? 'docs' : 'file-' + path.replace(/[^a-zA-Z0-9]/g, '_');

      if (isDoc && openTabs[id]) {
        await loadFileInto(openTabs[id].content, path);
        openTabs[id].tab.querySelector('.tab-label').textContent = path.split('/').pop();
        openTabs[id].path = path;
        switchTab(id);
        return;
      }
      if (openTabs[id]) { switchTab(id); return; }

      const tab = document.createElement('div');
      tab.className = 'tab'; tab.dataset.tab = id;
      const name = path.split('/').pop();
      tab.innerHTML = `<span class="tab-label" onclick="switchTab('${id}')">${esc(name)}</span><span class="tab-close" onclick="event.stopPropagation();closeTab('${id}')">&#215;</span>`;
      tab.onclick = () => switchTab(id);
      tabBar.appendChild(tab);

      const content = document.createElement('div');
      content.className = 'tab-content'; content.id = 'tab-' + id;
      content.innerHTML = '<div class="file-view"><div class="file-view-path">Loading...</div></div>';
      document.querySelector('.main').insertBefore(content, document.querySelector('.thinking-bar'));

      openTabs[id] = { tab, content, path };
      await loadFileInto(content, path);
      switchTab(id);
      bus.emit('file:open', path);
    }

    async function loadFileInto(el, path) {
      try {
        const r = await fetch('/file/' + encodeURIComponent(path));
        const text = await r.text();
        if (path.endsWith('.md')) {
          el.innerHTML = `<div class="md-view"><div class="file-view-path">${esc(path)}</div>${renderMd(text)}</div>`;
        } else {
          el.innerHTML = `<div class="file-view"><div class="file-view-path">${esc(path)}</div><pre>${esc(text)}</pre></div>`;
        }
      } catch (e) { el.innerHTML = '<div class="file-view">Failed to load file.</div>'; }
    }

    function closeTab(id) {
      const t = openTabs[id]; if (!t) return;
      t.tab.remove(); t.content.remove(); delete openTabs[id];
      switchTab('chat');
    }

    /* ── Input ── */
    promptEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        e.stopImmediatePropagation();
        awes.close();
        console.log('Enter pressed, calling sendPrompt, value:', promptEl.value);
        sendPrompt();
      }
    });
    document.addEventListener('keydown', async e => {
      if (e.key === 'Escape' && busy) {
        await fetch('/interrupt', { method: 'POST' });
        bus.emit('prompt:interrupt'); done('interrupted');
      }
    });

    async function sendPrompt() {
      const text = promptEl.value.trim();
      if (!text || busy) return;
      promptEl.value = '';
      awes.close();

      // Slash commands — IDE commands handled locally, rest to Claude
      if (text.startsWith('/') && handleSlashCommand(text)) return;

      switchTab('chat');
      lastUserEl = addTurn('user', text);
      lastUserEl.classList.add('thinking');
      curEl = null;
      // Clear tool panel for new prompt
      toolCount = 0; toolCountEl.textContent = '0';
      toolLogEl.innerHTML = '<div class="tool-empty">No tool calls yet.</div>';
      busy = true; sendBtn.disabled = true;
      escHint.classList.remove('hidden');
      thinkingBar.classList.add('active');
      bus.emit('prompt:send', text);

      const body = { prompt: text };
      if (activeFileCtx) body.file_context = activeFileCtx;
      await fetch('/prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    }

    function done(label) {
      busy = false; sendBtn.disabled = false;
      escHint.classList.add('hidden');
      thinkingBar.classList.remove('active');
      if (lastUserEl) lastUserEl.classList.remove('thinking');
      statusEl.textContent = label || '';
      curEl = null; promptEl.focus();
      bus.emit('prompt:done');
    }

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    const chatScroller = document.getElementById('tab-chat');

    function addTurn(role, content) {
      const labels = { user: 'You', assistant: 'Claude', system: 'System' };
      const d = document.createElement('div');
      d.className = `turn turn-${role}`;
      d.innerHTML = `<div class="turn-label">${labels[role] || role}</div><div class="turn-body"><pre>${esc(content)}</pre></div>`;
      msgsEl.appendChild(d);
      chatScroller.scrollTo({ top: chatScroller.scrollHeight, behavior: 'smooth' });
      return d;
    }

    function addToolCall(name, input) {
      if (toolCount === 0) toolLogEl.innerHTML = '';
      toolCount++; toolCountEl.textContent = toolCount;
      const d = document.createElement('div');
      d.className = 'tool-entry';
      const s = typeof input === 'string' ? input : JSON.stringify(input);
      d.innerHTML = `<span class="tool-name">${esc(name)}</span><div class="tool-input">${esc(s.slice(0, 200))}</div>`;
      toolLogEl.appendChild(d);
      toolLogEl.scrollTo({ top: toolLogEl.scrollHeight, behavior: 'smooth' });
    }

    function appendAssistant(text) {
      if (!curEl) curEl = addTurn('assistant', '');
      curEl.querySelector('pre').textContent += text;
      chatScroller.scrollTo({ top: chatScroller.scrollHeight, behavior: 'smooth' });
    }

    function handleEvent(raw) {
      try {
        const e = JSON.parse(raw);
        if (e.type === 'assistant' && e.message?.content) {
          e.message.content.forEach(c => {
            if (c.type === 'text') appendAssistant(c.text);
            if (c.type === 'tool_use') addToolCall(c.name, c.input);
          });
        } else if (e.type === 'result' && (e.subtype === 'success' || e.subtype === 'done')) {
          done();
        } else if (e.type === 'error') {
          addTurn('system', e.message || 'Unknown error'); done();
        } else if (e.type === 'reload') {
          nextIndex = 0; // reset before reload to avoid re-triggering
          location.reload();
        }
      } catch (err) {}
    }

    async function poll() {
      try {
        const r = await fetch(`/events?after=${nextIndex}`);
        const d = await r.json();
        d.events.forEach(handleEvent);
        nextIndex = d.next_index;
      } catch (e) {}
    }
    setInterval(poll, 250);

    /* ── Context sidebar ── */

    /* ── Bluebook panel ── */
    async function loadBluebooks() {
      try {
        const r = await fetch('/bluebooks');
        const d = await r.json();
        const body = document.getElementById('apps-body');
        if (!d.apps?.length) { body.innerHTML = '<span class="tool-empty">No applications found.</span>'; return; }

        // Group by app directory
        const groups = {};
        d.apps.forEach(app => {
          const key = app.group || app.path.replace(/\/[^/]+$/, '') || '_root';
          (groups[key] ||= []).push(app);
        });

        let html = '';
        for (const [group, apps] of Object.entries(groups)) {
          if (apps.length === 1) {
            // Single domain in directory — show flat, no group nesting
            const app = apps[0];
            const id = app.path.replace(/[^a-zA-Z0-9]/g, '_');
            html += `<div class="book-app">`;
            html += `<div class="book-app-name" onclick="toggleBookAggs('${id}')">`;
            html += `<span class="book-chevron" id="chev-${id}">&#9654;</span> ${esc(app.name)}`;
            html += `</div>`;
            html += `<div class="book-aggs collapsed" id="aggs-${id}">`;
            html += `<a class="ctx-link" onclick="openWorkshop('${app.path}','${esc(app.name)}')" style="color:var(--blue)">Bluebook</a>`;
            if (app.hecksagon) html += `<a class="ctx-link" onclick="openHecksagon('${app.hecksagon}')" style="color:var(--yellow)">Hecksagon</a>`;
            html += `</div></div>`;
          } else {
            // Multi-domain app — group header, then "Bluebooks" sub-header
            const gid = group.replace(/[^a-zA-Z0-9]/g, '_');
            const label = group.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            html += `<div class="book-app">`;
            html += `<div class="book-app-name" onclick="toggleBookAggs('g_${gid}')">`;
            html += `<span class="book-chevron" id="chev-g_${gid}">&#9654;</span> ${esc(label)}`;
            html += `</div>`;
            html += `<div class="book-aggs collapsed" id="aggs-g_${gid}">`;
            // Bluebooks sub-header
            html += `<div class="book-app-name" onclick="toggleBookAggs('bb_${gid}')" style="color:var(--blue)">`;
            html += `<span class="book-chevron" id="chev-bb_${gid}">&#9654;</span> Bluebooks`;
            html += `</div>`;
            html += `<div class="book-aggs collapsed" id="aggs-bb_${gid}">`;
            apps.forEach(app => {
              html += `<a class="ctx-link" onclick="openWorkshop('${app.path}','${esc(app.name)}')" style="padding-left:8px">${esc(app.name)}</a>`;
            });
            html += `</div>`;
            html += `</div></div>`;
          }
        }
        body.innerHTML = html;
      } catch (e) {
        document.getElementById('apps-body').textContent = 'Failed to load.';
      }
    }

    function toggleBookAggs(id) {
      const el = document.getElementById('aggs-' + id);
      const chev = document.getElementById('chev-' + id);
      el.classList.toggle('collapsed');
      chev.classList.toggle('open');
    }


    function cacheAggAttrs(state) {
      if (!state?.aggregates) return;
      wsAggAttrs = {};
      state.aggregates.forEach(a => {
        wsAggAttrs[a.name.toLowerCase()] = a.attributes.map(at => at.name);
      });
    }

    /* ── Events sidebar ── */
    const eventsSidebar = document.getElementById('events-sidebar');
    const eventListEl = document.getElementById('event-list');

    function renderEvents(events) {
      eventsSidebar.classList.add('open');
      if (!events.length) {
        eventListEl.innerHTML = '<div class="event-empty">No events yet. Run a command.</div>';
        return;
      }
      eventListEl.innerHTML = events.map(e => {
        const attrs = Object.entries(e.attributes || {}).map(([k,v]) => `${k}: ${v}`).join(', ');
        return `<div class="event-item"><span class="event-type">${esc(e.type)}</span><div class="event-attrs">${esc(attrs)}</div></div>`;
      }).join('');
      eventListEl.scrollTo({ top: eventListEl.scrollHeight, behavior: 'smooth' });
    }

    function openHecksagon(path) {
      console.log('openHecksagon called:', path);
      showPanel('hex');
      document.querySelector('.panel-dot-hex').classList.remove('inactive');

      fetch('/file/' + encodeURIComponent(path))
        .then(function(r) { return r.text(); })
        .then(function(text) {
          console.log('Hecksagon file loaded, length:', text.length);

          // Sidebar panel
          var body = document.getElementById('hex-body');
          body.innerHTML = '<div class="file-view-path">' + esc(path) + '</div><pre style="font-size:11px;line-height:1.5;white-space:pre-wrap">' + esc(text) + '</pre>';

          // Main tab
          var id = 'hecksagon';
          var name = path.split('/').pop();
          if (openTabs[id]) closeTab(id);

          var tab = document.createElement('div');
          tab.className = 'tab';
          tab.dataset.tab = id;
          tab.innerHTML = '<span class="tab-label">' + esc(name) + '</span><span class="tab-close" onclick="event.stopPropagation();closeTab(\'' + id + '\')">&#215;</span>';
          tab.onclick = function() { switchTab(id); };
          tabBar.appendChild(tab);

          var content = document.createElement('div');
          content.className = 'tab-content';
          content.id = 'tab-' + id;
          var diagram = buildHecksagonDiagram(text, path);
          content.innerHTML =
            '<div class="ws-diagram"><div class="ws-diagram-title">' + esc(name) + '</div><pre class="mermaid-pending">' + esc(diagram) + '</pre></div>' +
            '<div class="file-view"><div class="file-view-path">' + esc(path) + '</div><pre>' + esc(text) + '</pre></div>';
          document.querySelector('.main').insertBefore(content, document.querySelector('.thinking-bar'));
          openTabs[id] = { tab: tab, content: content, path: path };

          switchTab(id);
          setTimeout(function() { if (window.renderMermaid) window.renderMermaid(); }, 200);
        })
        .catch(function(e) { console.error('openHecksagon error:', e); });
    }

    function buildHecksagonDiagram(text, path) {
      const name = path.split('/').pop().replace(/Hecksagon$/, '');
      const caps = [...text.matchAll(/capabilities\s+(.+)/g)].map(m => m[1].trim());
      const tags = [...text.matchAll(/capability\.(\w+)\.(\w+)/g)].map(m => `${m[1]}.${m[2]}`);
      const gates = [...text.matchAll(/gate\s+"(\w+)",\s*:(\w+)\s+do\s*\n\s*allow\s+([^\n]+)/g)]
        .map(m => ({ agg: m[1], role: m[2], methods: m[3].trim() }));
      const adapter = text.match(/adapter\s+:(\w+)/)?.[1];
      const tenancy = text.match(/tenancy\s+:(\w+)/)?.[1];

      let d = 'graph TD\n';
      d += `  H["${name} Hecksagon"]\n`;
      if (adapter) d += `  DB[("${adapter}")]\n  H --> DB\n`;
      if (tenancy) d += `  T["tenancy: ${tenancy}"]\n  H -.-> T\n`;
      caps.forEach(c => {
        c.split(/[,\s]+:?/).filter(Boolean).forEach(cap => {
          const cl = cap.replace(/^:/, '');
          d += `  ${cl}["${cl}"]\n  H -->|capability| ${cl}\n`;
        });
      });
      tags.forEach(t => {
        const [attr, tag] = t.split('.');
        d += `  ${attr}_${tag}["${attr}.${tag}"]\n  H -.-> ${attr}_${tag}\n`;
      });
      const aggGates = {};
      gates.forEach(g => { (aggGates[g.agg] ||= []).push(g); });
      for (const [agg, gs] of Object.entries(aggGates)) {
        const roles = gs.map(g => `${g.role}: ${g.methods}`).join('<br/>');
        d += `  ${agg}["${agg}<br/><small>${roles}</small>"]\n  H --> ${agg}\n`;
      }
      return d;
    }

    loadBluebooks();

    /* ── Slash commands ── */
    const ideCommands = {
      '/hecks-ide-clear': () => { msgsEl.innerHTML = ''; },
      '/hecks-ide-reset': () => { msgsEl.innerHTML = ''; nextIndex = 0; },
    };
    const claudeCommands = ['/commit', '/review', '/help', '/compact', '/clear', '/cost', '/init',
      '/pr-comments', '/release-notes', '/security-review', '/simplify'];

    function handleSlashCommand(text) {
      const cmd = text.split(/\s/)[0];
      if (ideCommands[cmd]) {
        ideCommands[cmd]();
        addTurn('system', `Ran ${cmd}`);
        return true;
      }
      return false; // pass to Claude
    }

    /* ── Workshop ── */
    let wsCompletions = [], wsAggAttrs = {}, wsActive = false;
    const cmdHistory = [];
    let histIdx = -1;


    async function openWorkshop(path, name) {
      const r = await fetch('/workshop/open', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path })
      });
      const d = await r.json();
      wsCompletions = d.completions || [];
      cacheAggAttrs(d.state);
      wsActive = true;

      // Create or reuse workshop tab
      const id = 'workshop';
      if (!openTabs[id]) {
        const tab = document.createElement('div');
        tab.className = 'tab'; tab.dataset.tab = id;
        tab.innerHTML = `<span class="tab-label" onclick="switchTab('${id}')">${esc(name)}</span><span class="tab-close" onclick="event.stopPropagation();closeWorkshop()">&#215;</span>`;
        tab.onclick = () => switchTab(id);
        tabBar.appendChild(tab);

        const content = document.createElement('div');
        content.className = 'tab-content'; content.id = 'tab-' + id;
        content.innerHTML = `<div class="ws-diagram"><div class="ws-diagram-title">${esc(d.domain)}</div><pre class="mermaid-pending">${esc(d.diagram || '')}</pre></div><div class="ws-output" id="ws-output"><div class="ws-entry"><span class="ws-mode">Workshop: ${esc(d.domain)} (sketch mode)</span></div></div>`;
        document.querySelector('.main').insertBefore(content, document.querySelector('.thinking-bar'));
        openTabs[id] = { tab, content, path };
      } else {
        openTabs[id].tab.querySelector('.tab-label').textContent = name;
        const diagEl = openTabs[id].content.querySelector('.ws-diagram');
        if (diagEl) diagEl.innerHTML = `<pre class="mermaid-pending">${esc(d.diagram || '')}</pre>`;
        document.getElementById('ws-output').innerHTML = `<div class="ws-entry"><span class="ws-mode">Workshop: ${esc(d.domain)} (sketch mode)</span></div>`;
      }
      switchTab(id);
      promptEl.placeholder = `${d.domain} workshop > `;
      setTimeout(() => { if (window.renderMermaid) window.renderMermaid(); }, 100);
    }

    function closeWorkshop() {
      wsActive = false;
      closeTab('workshop');
      promptEl.placeholder = 'Type a message...';
      eventsSidebar.classList.remove('open');
    }

    async function sendWorkshopCommand(cmd) {
      const out = document.getElementById('ws-output');
      const scroller = out.closest('.tab-content');
      const entry = document.createElement('div');
      entry.className = 'ws-entry';
      entry.innerHTML = `<div class="ws-cmd">${esc(cmd)}</div>`;
      out.appendChild(entry);
      scroller.scrollTo({ top: scroller.scrollHeight, behavior: 'smooth' });

      const r = await fetch('/workshop/command', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: cmd })
      });
      const d = await r.json();
      wsCompletions = d.completions || wsCompletions;
      cacheAggAttrs(d.state);

      if (d.error) entry.innerHTML += `<div class="ws-result ws-error">${esc(d.error)}</div>`;
      else if (d.output) entry.innerHTML += `<div class="ws-result">${esc(d.output)}</div>`;
      scroller.scrollTo({ top: scroller.scrollHeight, behavior: 'smooth' });

      // Show events sidebar in play mode
      if (d.state?.mode === 'play') {
        renderEvents(d.state.events || []);
      }
    }

    // Build completions list based on current input context
    function buildCompletions(val) {
      const inWorkshop = wsActive && document.querySelector('.tab[data-tab="workshop"].active');

      if (val.startsWith('/')) {
        const ide = Object.keys(ideCommands).filter(c => c.startsWith(val));
        const claude = inWorkshop ? [] : claudeCommands.filter(c => c.startsWith(val));
        return [...ide, ...claude];
      }

      if (!wsActive) return [];

      const parenIdx = val.indexOf('(');
      const dotIdx = val.indexOf('.');

      if (parenIdx > 0) {
        const target = val.slice(0, dotIdx > 0 ? dotIdx : parenIdx).trim();
        const inside = val.slice(parenIdx + 1);
        const lastArg = inside.split(',').pop().trim();
        const attrs = wsAggAttrs[target] || [];
        const raw = promptEl.value.trim();
        const prefix = raw.slice(0, raw.length - lastArg.length);
        return attrs.filter(a => !lastArg || a.startsWith(lastArg)).map(a => prefix + a + ': ');
      }

      if (dotIdx > 0) {
        const target = promptEl.value.trim().slice(0, dotIdx);
        const partial = val.slice(dotIdx + 1);
        const methods = ['attr', 'command', 'query', 'value_object', 'entity', 'reference_to',
          'validation', 'invariant', 'lifecycle', 'specification', 'describe',
          'create', 'find', 'all', 'count', 'first', 'last', 'new'];
        return methods.filter(m => m.startsWith(partial)).map(m => target + '.' + m);
      }

      return wsCompletions.filter(c => c.toLowerCase().startsWith(val));
    }


    // Override Enter to route to workshop when active
    const origKeydown = promptEl.onkeydown;
    promptEl.addEventListener('keydown', e => {
      // Command history — up/down when awesomplete is not open
      const awesOpen = document.querySelector('.awesomplete > ul[hidden]') === null;
      if (e.key === 'ArrowUp' && !awesOpen && cmdHistory.length) {
        e.preventDefault();
        if (histIdx < 0) histIdx = cmdHistory.length;
        histIdx = Math.max(histIdx - 1, 0);
        promptEl.value = cmdHistory[histIdx] || '';
        return;
      }
      if (e.key === 'ArrowDown' && !awesOpen && histIdx >= 0) {
        e.preventDefault();
        histIdx = Math.min(histIdx + 1, cmdHistory.length);
        promptEl.value = histIdx < cmdHistory.length ? cmdHistory[histIdx] : '';
        return;
      }
    }, true);

    // Awesomplete — init AFTER keydown handlers so Enter reaches us first
    const awes = new Awesomplete(promptEl, {
      minChars: 1, maxItems: 10, autoFirst: false,
      filter: function() { return true; },
      list: []
    });

    promptEl.addEventListener('input', () => {
      const val = promptEl.value.trim().toLowerCase();
      if (!val) { awes.close(); return; }
      const inWorkshop = wsActive && document.querySelector('.tab[data-tab="workshop"].active');
      if (!inWorkshop && !val.startsWith('/')) { awes.close(); return; }
      const items = buildCompletions(val);
      if (!items.length) { awes.close(); return; }
      awes.list = items;
      awes.evaluate();
    });

    // Intercept sendPrompt when workshop is active
    const _origSend = sendPrompt;
    sendPrompt = async function() {
      const text = promptEl.value.trim();
      if (!text) return;

      // Push to history
      if (!text.startsWith('/')) {
        cmdHistory.push(text);
      }
      histIdx = -1;

      // Slash commands work everywhere
      if (text.startsWith('/') && handleSlashCommand(text)) {
        promptEl.value = '';
        awes.close();
        return;
      }

      if (wsActive && document.querySelector('.tab[data-tab="workshop"].active')) {
        promptEl.value = '';
        awes.close();
        await sendWorkshopCommand(text);
        return;
      }
      return _origSend();
    };

    /* ── Markdown renderer ── */
    function renderMd(src) {
      let html = '', inCode = false, codeLines = [];
      const lines = src.split('\n');
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];
        if (line.startsWith('```')) {
          if (inCode) { html += `<pre><code>${esc(codeLines.join('\n'))}</code></pre>`; inCode = false; codeLines = []; }
          else { inCode = true; }
          i++; continue;
        }
        if (inCode) { codeLines.push(line); i++; continue; }
        if (line.startsWith('### ')) html += `<h3>${mdInline(line.slice(4))}</h3>`;
        else if (line.startsWith('## ')) html += `<h2>${mdInline(line.slice(3))}</h2>`;
        else if (line.startsWith('# ')) html += `<h1>${mdInline(line.slice(2))}</h1>`;
        else if (line.startsWith('> ')) html += `<blockquote>${mdInline(line.slice(2))}</blockquote>`;
        else if (/^[-*] /.test(line)) {
          html += '<ul>';
          while (i < lines.length && /^[-*] /.test(lines[i])) { html += `<li>${mdInline(lines[i].slice(2))}</li>`; i++; }
          html += '</ul>'; continue;
        } else if (/^\d+\. /.test(line)) {
          html += '<ol>';
          while (i < lines.length && /^\d+\. /.test(lines[i])) { html += `<li>${mdInline(lines[i].replace(/^\d+\.\s*/, ''))}</li>`; i++; }
          html += '</ol>'; continue;
        } else if (line.trim() === '') { /* skip */ }
        else html += `<p>${mdInline(line)}</p>`;
        i++;
      }
      if (inCode) html += `<pre><code>${esc(codeLines.join('\n'))}</code></pre>`;
      return html;
    }
    function mdInline(s) {
      return esc(s).replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    }
  </script>
</body>
