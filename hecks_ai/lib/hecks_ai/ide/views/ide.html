<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hecks IDE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0d1117', 'bg-msg': '#161b22', 'bg-user': '#1c2333',
            border: '#30363d', fg: '#c9d1d9', 'fg-dim': '#8b949e',
            accent: { blue: '#58a6ff', green: '#7ee787', yellow: '#d29922', red: '#f85149', purple: '#bc8cff' }
          },
          fontFamily: {
            mono: ["'SF Mono'", "'Fira Code'", "'Cascadia Code'", "'Menlo'", 'monospace']
          }
        }
      }
    }
  </script>
  <style>
    /* Animations and overrides that Tailwind can't handle */
    @keyframes shimmer-msg { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    @keyframes thinking-shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

    .turn-user.thinking .turn-body {
      background: linear-gradient(90deg, #1c2333 0%, #253a5e 30%, #2d4a7a 50%, #253a5e 70%, #1c2333 100%);
      background-size: 300% 100%; animation: shimmer-msg 2s ease-in-out infinite;
      border-left-color: #79c0ff; box-shadow: 0 0 12px rgba(88, 166, 255, 0.2);
    }
    .thinking-bar-inner {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, transparent 0%, #0a3d91 10%, #1a6dff 20%, #3b8bff 30%, #58a6ff 40%, #79c0ff 48%, #a5d8ff 50%, #79c0ff 52%, #58a6ff 60%, #3b8bff 70%, #1a6dff 80%, #0a3d91 90%, transparent 100%);
      background-size: 200% 100%; animation: thinking-shimmer 3s ease-in-out infinite;
      box-shadow: 0 0 12px rgba(88, 166, 255, 0.6), 0 0 4px rgba(121, 192, 255, 0.4);
    }

    /* Panel collapse animation */
    .panel-body { transition: max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease; max-height: 500px; opacity: 1; }
    .panel.closed .panel-body { max-height: 0 !important; opacity: 0; padding-top: 0 !important; padding-bottom: 0 !important; overflow: hidden !important; }
    .panel.closed .panel-chevron { transform: rotate(-90deg); }

    /* Awesomplete overrides */
    .awesomplete > ul { background: #161b22 !important; border: 1px solid #30363d !important; border-radius: 6px !important; color: #c9d1d9 !important; font-family: 'SF Mono', monospace; font-size: 13px; bottom: 100% !important; top: auto !important; margin-bottom: 4px; box-shadow: 0 -4px 16px rgba(0,0,0,0.4) !important; max-height: 400px !important; overflow-y: auto !important; }
    .awesomplete > ul::before { display: none !important; }
    .awesomplete > ul > li { padding: 4px 12px !important; background: transparent !important; color: #c9d1d9 !important; }
    .awesomplete > ul > li:hover, .awesomplete > ul > li[aria-selected="true"] { background: #1c2333 !important; color: #58a6ff !important; }
    .awesomplete mark { background: none !important; color: #58a6ff !important; font-weight: 600; }
    .awesomplete .visually-hidden { position: absolute; clip: rect(0,0,0,0); height: 1px; width: 1px; overflow: hidden; }
    .input-area .awesomplete { flex: 1; display: flex; }
    .input-area .awesomplete input, .input-area .awesomplete textarea { flex: 1; }

    /* Workshop command prompt pseudo-element */
    .ws-cmd::before { content: '> '; color: #8b949e; }

    /* Mermaid pending */
    .mermaid-pending { visibility: hidden; }

    /* Tab content — hidden by default, fills remaining space when active */
    .tab-content { display: none; overflow-y: auto; scroll-behavior: smooth; }
    .tab-content.active { display: block; flex: 1; }
    .tab.active { color: #c9d1d9; background: #161b22; border-bottom: 2px solid #58a6ff; }

    /* Book aggs collapse */
    .book-aggs.collapsed { display: none; }
    .book-chevron.open { transform: rotate(90deg); }

    /* Remaining dynamic classes — used by JS for state toggles and pseudo-elements */
    .book-chevron { font-size: 8px; transition: transform 0.15s; }
    .book-aggs { padding-left: 14px; }
    .active.book-app-name, .active.ctx-link-hl { background: #1c2333; border-radius: 4px; }

    /* Markdown — kept as CSS since Tailwind can't style rendered HTML children */

    /* Events sidebar open state */
    .events-sidebar.open { width: 240px; display: block; }

    /* Sidebar collapsed */
    #sidebar.collapsed { width: 0; overflow: hidden; border: none; }
  </style>
</head>
<body class="h-full bg-bg text-fg overflow-hidden">
  <div class="flex h-screen" id="layout">
    <!-- Events sidebar (left) -->
    <div class="w-0 border-r border-border overflow-y-auto font-mono text-xs transition-all duration-300 hidden" id="events-sidebar">
      <div class="p-2.5 px-3 text-[10px] uppercase tracking-wider text-accent-green font-semibold border-b border-border">Events</div>
      <div class="p-2" id="event-list">
        <div class="text-fg-dim italic p-3">Enter play! to see events.</div>
      </div>
    </div>

    <!-- Main pane -->
    <div class="flex-1 flex flex-col min-w-0 main">
      <!-- Menu bar -->
      <div class="flex items-center gap-4 px-4 py-1 border-b border-border bg-bg font-mono text-[11px] text-fg-dim select-none">
        <span class="cursor-pointer hover:text-fg" onclick="IDE.bus.emit('app-picker:open')">Apps <span class="text-[9px] opacity-50">Ctrl+O</span></span>
        <span class="cursor-pointer hover:text-fg" onclick="IDE.bus.emit('session-picker:open')">Sessions <span class="text-[9px] opacity-50">Ctrl+S</span></span>
        <span class="cursor-pointer hover:text-fg" onclick="IDE.bus.emit('palette:open')">Command Palette <span class="text-[9px] opacity-50">Ctrl+P</span></span>
      </div>

      <!-- Tab bar -->
      <div class="flex border-b border-border bg-bg font-mono text-xs overflow-x-auto" id="tab-bar">
        <div class="px-4 py-2 cursor-pointer text-fg-dim border-r border-border whitespace-nowrap flex items-center gap-1.5 select-none tab tab-chat active text-accent-green font-semibold" data-tab="chat" onclick="switchTab('chat')">Chat</div>
      </div>

      <!-- Session banner -->
      <div class="hidden font-mono text-[11px] text-fg-dim bg-bg-msg border-b border-border px-4 py-1.5 flex items-center justify-between" id="session-banner">
        <span id="session-banner-text"></span>
        <span class="cursor-pointer text-accent-red hover:opacity-80" onclick="IDE.bus.emit('session:disconnect')" title="Disconnect">&#10005;</span>
      </div>

      <!-- Chat content -->
      <div class="flex-1 overflow-y-auto scroll-smooth tab-content active" id="tab-chat">
        <div class="p-4" id="messages"></div>
      </div>

      <!-- Thinking bar -->
      <div class="h-[3px] opacity-0 transition-opacity duration-500 overflow-hidden" id="thinking-bar"><div class="thinking-bar-inner"></div></div>

      <!-- Did you know -->
      <div id="tip-bar" class="px-4 py-1.5 border-t border-border text-[11px] text-fg-dim font-mono">
        <span id="tip-text" style="transition:opacity 0.3s"></span>
      </div>

      <!-- Input area -->
      <div class="p-3 px-4 border-t border-border flex items-start gap-2 relative input-area">
        <textarea id="prompt" rows="1" placeholder="Type a message..." autofocus
          class="flex-1 bg-bg-msg border border-border rounded-lg text-fg py-2.5 px-3.5 font-mono text-sm outline-none focus:border-accent-blue placeholder:text-fg-dim resize-none overflow-hidden"
          style="max-height:4.5em;line-height:1.5em"></textarea>
        <button id="send" onclick="sendPrompt()"
          class="bg-green-700 hover:bg-green-600 text-white border-none rounded-lg py-2.5 px-5 text-sm cursor-pointer font-mono disabled:opacity-40 disabled:cursor-default">Send</button>
        <span class="text-[11px] text-fg-dim hidden" id="esc-hint">esc to cancel</span>
        <span id="status"></span>
      </div>
    </div>

    <!-- Right sidebar -->
    <div class="w-[280px] border-l border-border flex flex-col overflow-y-auto font-mono text-xs transition-all duration-200" id="sidebar">
      <!-- Nav dots -->
      <div class="flex gap-1.5 p-2 px-3 border-b border-border" id="panel-nav">
        <div class="w-[22px] h-[22px] rounded-full flex items-center justify-center cursor-pointer text-[11px] transition-opacity bg-accent-red text-bg hover:opacity-80 panel-dot panel-dot-apps" onclick="toggleDotPanel('apps')" title="Applications">A</div>
        <div class="w-[22px] h-[22px] rounded-full flex items-center justify-center cursor-pointer text-[11px] transition-opacity bg-accent-green text-bg hover:opacity-80 panel-dot panel-dot-docs" onclick="toggleDotPanel('docs-panel')" title="Documentation">D</div>
        <div class="w-[22px] h-[22px] rounded-full flex items-center justify-center cursor-pointer text-[11px] transition-opacity bg-accent-purple text-bg hover:opacity-80 opacity-30 panel-dot panel-dot-hex inactive" onclick="toggleDotPanel('hex')" title="Hecksagon">H</div>
        <div class="w-[22px] h-[22px] rounded-full flex items-center justify-center cursor-pointer text-[11px] transition-opacity bg-accent-yellow text-bg hover:opacity-80 panel-dot panel-dot-tools" onclick="toggleDotPanel('tools')" title="Tool Calls">T</div>
        <div class="w-[22px] h-[22px] rounded-full flex items-center justify-center cursor-pointer text-[11px] transition-opacity bg-accent-blue text-bg hover:opacity-80 panel-dot panel-dot-ide-log" onclick="toggleDotPanel('ide-log')" title="IDE Log">L</div>
        <div class="w-[22px] h-[22px] rounded-full flex items-center justify-center cursor-pointer text-[11px] transition-opacity bg-white text-bg hover:opacity-80 panel-dot panel-dot-tests" onclick="toggleDotPanel('tests')" title="Hecks IDE Tests">&#9655;</div>
      </div>

      <!-- Applications panel -->
      <div class="border-b border-border panel panel-apps" id="panel-apps">
        <div class="py-2 px-3.5 cursor-pointer select-none flex justify-between items-center text-[10px] uppercase tracking-wider font-semibold text-accent-red hover:bg-bg-msg panel-head">
          <span onclick="collapsePanel('apps')">Applications <span class="transition-transform text-[9px] panel-chevron">&#9660;</span></span>
        </div>
        <div class="px-3.5 pb-3 pt-1 leading-relaxed overflow-y-auto panel-body" id="apps-body">Loading...</div>
      </div>

      <!-- Documentation panel -->
      <div class="border-b border-border panel panel-docs closed" id="panel-docs-panel">
        <div class="py-2 px-3.5 cursor-pointer select-none flex justify-between items-center text-[10px] uppercase tracking-wider font-semibold text-accent-green hover:bg-bg-msg panel-head">
          <span onclick="collapsePanel('docs-panel')">Documentation <span class="transition-transform text-[9px] panel-chevron">&#9660;</span></span>
        </div>
        <div class="px-3.5 pb-3 pt-1 leading-relaxed overflow-y-auto panel-body" id="docs-body"><span class="text-fg-dim italic">Loading...</span></div>
      </div>

      <!-- Hecksagon panel -->
      <div class="border-b border-border hidden panel panel-hex" id="panel-hex">
        <div class="py-2 px-3.5 cursor-pointer select-none flex justify-between items-center text-[10px] uppercase tracking-wider font-semibold text-accent-purple hover:bg-bg-msg panel-head">
          <span onclick="collapsePanel('hex')">Hecksagon <span class="transition-transform text-[9px] panel-chevron">&#9660;</span></span>
        </div>
        <div class="px-3.5 pb-3 pt-1 leading-relaxed overflow-y-auto panel-body" id="hex-body"></div>
      </div>

      <!-- Tests panel -->
      <div class="border-b border-border panel panel-tests closed" id="panel-tests">
        <div class="py-2 px-3.5 cursor-pointer select-none flex justify-between items-center text-[10px] uppercase tracking-wider font-semibold text-white hover:bg-bg-msg panel-head">
          <span onclick="collapsePanel('tests')">Hecks IDE Tests <span class="text-[9px] bg-border text-fg rounded-full px-1.5 py-px ml-1.5" id="test-panel-count">0</span> <span class="transition-transform text-[9px] panel-chevron">&#9660;</span></span>
        </div>
        <div class="px-3.5 pb-3 pt-1 leading-relaxed overflow-y-auto max-h-60 panel-body" id="test-panel-body">
          <button class="bg-accent-green text-bg text-[11px] font-semibold px-3 py-1 rounded cursor-pointer hover:opacity-80 mb-2" onclick="IDE.bus.emit('test:run')">Run Tests</button>
          <div id="test-panel-log" class="font-mono text-[11px] leading-relaxed"></div>
        </div>
      </div>

      <!-- Tool Calls panel -->
      <div class="border-b border-border panel panel-tools closed" id="panel-tools">
        <div class="py-2 px-3.5 cursor-pointer select-none flex justify-between items-center text-[10px] uppercase tracking-wider font-semibold text-accent-yellow hover:bg-bg-msg panel-head">
          <span onclick="collapsePanel('tools')">Tool Calls <span class="text-[9px] bg-border text-fg rounded-full px-1.5 py-px ml-1.5" id="tool-count">0</span> <span class="transition-transform text-[9px] panel-chevron">&#9660;</span></span>
        </div>
        <div class="px-3.5 pb-3 pt-1 leading-relaxed overflow-y-auto panel-body" id="tool-log" style="max-height:300px;"><div class="text-fg-dim italic">No tool calls yet.</div></div>
      </div>

      <!-- IDE Log panel -->
      <div class="border-b border-border panel panel-ide-log closed" id="panel-ide-log">
        <div class="py-2 px-3.5 cursor-pointer select-none flex justify-between items-center text-[10px] uppercase tracking-wider font-semibold text-accent-blue hover:bg-bg-msg panel-head">
          <span onclick="collapsePanel('ide-log')">IDE Log <span class="text-[9px] bg-border text-fg rounded-full px-1.5 py-px ml-1.5" id="ide-log-count">0</span> <span class="transition-transform text-[9px] panel-chevron">&#9660;</span></span>
        </div>
        <div class="px-3.5 pb-3 pt-1 leading-relaxed overflow-y-auto max-h-60 panel-body font-mono text-[10px]" id="command-log"></div>
      </div>
    </div>
  </div>

  <button class="fixed top-2 right-3 z-10 bg-bg-msg border border-border rounded-md text-fg-dim font-mono text-[11px] py-1 px-2.5 cursor-pointer hover:text-fg hover:border-accent-blue" onclick="toggleSidebar()">&#9776;</button>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/awesomplete@1.1.5/awesomplete.css">
  <script src="https://cdn.jsdelivr.net/npm/awesomplete@1.1.5/awesomplete.min.js"></script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });
    window.renderMermaid = async function() {
      const els = document.querySelectorAll('.mermaid-pending');
      for (const el of els) {
        const id = 'mm-' + Math.random().toString(36).slice(2);
        const { svg } = await mermaid.render(id, el.textContent);
        el.innerHTML = svg;
        el.classList.remove('mermaid-pending');
        el.classList.add('mermaid-rendered');
      }
    };
  </script>
  <script src="/ide.js"></script>
</body>
</html>
