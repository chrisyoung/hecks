<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HecksAppeal IDE</title>
  <link rel="stylesheet" href="/assets/css/tailwind.css">

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'dark', themeVariables: { darkMode: true } });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body class="bg-base text-white/[.87] font-sans h-screen overflow-hidden">
  <canvas id="bg-canvas" aria-hidden="true" class="fixed inset-0 -z-10"></canvas>

  <div id="ide" class="flex flex-col h-screen">
    <!-- Menu Bar -->
    <header role="menubar" aria-label="Main Menu" class="h-9 flex items-center bg-surface border-b border-white/[.12]">
      <div class="flex items-center flex-1">
        <div class="relative">
          <button role="menuitem" aria-haspopup="true" aria-expanded="false" class="px-3 h-9 text-sm text-white/[.87] hover:bg-white/[.08] transition-colors" data-menu="file">File</button>
          <div class="absolute bg-elevated border border-white/[.12] rounded-md shadow-lg z-50 min-w-[200px]" role="menu" aria-label="File Menu" hidden>
            <button role="menuitem" class="w-full text-left px-3 py-1.5 text-sm text-white/[.87] hover:bg-white/[.08] flex justify-between" data-action="menu-action" data-menu-action="open-project">Open Project<span class="text-white/[.38] text-xs ml-4">Ctrl+O</span></button>
            <button role="menuitem" class="w-full text-left px-3 py-1.5 text-sm text-white/[.87] hover:bg-white/[.08] flex justify-between" data-action="menu-action" data-menu-action="refresh-projects">Refresh<span class="text-white/[.38] text-xs ml-4">Ctrl+R</span></button>
            <div class="border-t border-white/[.12] my-1" role="separator"></div>
            <button role="menuitem" class="w-full text-left px-3 py-1.5 text-sm text-white/[.87] hover:bg-white/[.08]" data-action="menu-action" data-menu-action="close-project">Close Project</button>
          </div>
        </div>
        <div class="relative">
          <button role="menuitem" aria-haspopup="true" aria-expanded="false" class="px-3 h-9 text-sm text-white/[.87] hover:bg-white/[.08] transition-colors" data-menu="view">View</button>
          <div class="absolute bg-elevated border border-white/[.12] rounded-md shadow-lg z-50 min-w-[200px]" role="menu" aria-label="View Menu" hidden>
            <button role="menuitem" class="w-full text-left px-3 py-1.5 text-sm text-white/[.87] hover:bg-white/[.08] flex justify-between" data-action="toggle-sidebar">Toggle Sidebar<span class="text-white/[.38] text-xs ml-4">Ctrl+B</span></button>
            <button role="menuitem" class="w-full text-left px-3 py-1.5 text-sm text-white/[.87] hover:bg-white/[.08] flex justify-between" data-action="toggle-events">Toggle Events<span class="text-white/[.38] text-xs ml-4">Ctrl+`</span></button>
            <button role="menuitem" class="w-full text-left px-3 py-1.5 text-sm text-white/[.87] hover:bg-white/[.08]" data-action="menu-action" data-menu-action="hide-projects">Hide Projects</button>
            <button role="menuitem" class="w-full text-left px-3 py-1.5 text-sm text-white/[.87] hover:bg-white/[.08]" data-action="menu-action" data-menu-action="show-projects">Show Projects</button>
            <div class="border-t border-white/[.12] my-1" role="separator"></div>
            <button role="menuitem" class="w-full text-left px-3 py-1.5 text-sm text-white/[.87] hover:bg-white/[.08] flex justify-between" data-action="menu-action" data-menu-action="focus-editor">Editor<span class="text-white/[.38] text-xs ml-4">Ctrl+1</span></button>
            <button role="menuitem" class="w-full text-left px-3 py-1.5 text-sm text-white/[.87] hover:bg-white/[.08] flex justify-between" data-action="menu-action" data-menu-action="focus-diagrams">Diagrams<span class="text-white/[.38] text-xs ml-4">Ctrl+2</span></button>
            <button role="menuitem" class="w-full text-left px-3 py-1.5 text-sm text-white/[.87] hover:bg-white/[.08] flex justify-between" data-action="menu-action" data-menu-action="focus-console">Console<span class="text-white/[.38] text-xs ml-4">Ctrl+3</span></button>
          </div>
        </div>
        <div class="relative">
          <button role="menuitem" aria-haspopup="true" aria-expanded="false" class="px-3 h-9 text-sm text-white/[.87] hover:bg-white/[.08] transition-colors" data-menu="domain">Domain</button>
          <div class="absolute bg-elevated border border-white/[.12] rounded-md shadow-lg z-50 min-w-[200px]" role="menu" aria-label="Domain Menu" hidden>
            <button role="menuitem" class="w-full text-left px-3 py-1.5 text-sm text-white/[.87] hover:bg-white/[.08]" data-action="menu-action" data-menu-action="view-all-diagrams">View All Diagrams</button>
            <button role="menuitem" class="w-full text-left px-3 py-1.5 text-sm text-white/[.87] hover:bg-white/[.08]" data-action="menu-action" data-menu-action="run-analysis">Run Analysis</button>
            <div class="border-t border-white/[.12] my-1" role="separator"></div>
            <button role="menuitem" class="w-full text-left px-3 py-1.5 text-sm text-white/[.87] hover:bg-white/[.08]" data-action="menu-action" data-menu-action="export-bluebook">Export Bluebook</button>
            <button role="menuitem" class="w-full text-left px-3 py-1.5 text-sm text-white/[.87] hover:bg-white/[.08]" data-action="menu-action" data-menu-action="view-glossary">View Glossary</button>
          </div>
        </div>
      </div>
      <div class="flex items-center px-3">
        <span class="text-sm text-white/[.54] font-medium tracking-wide">HecksAppeal</span>
      </div>
    </header>

    <!-- Main Content Area -->
    <div class="flex flex-1 overflow-hidden">
      <!-- Sidebar Expand Button (visible when collapsed) -->
      <button id="sidebar-expand" aria-label="Expand Sidebar" class="bg-surface border-r border-white/[.12] px-1 text-white/[.54] hover:text-white/[.87] transition-colors" data-action="expand-sidebar" style="display: none;">
        <span aria-hidden="true">&raquo;</span>
      </button>
      <!-- Sidebar -->
      <nav id="sidebar" role="navigation" aria-label="Domain Browser" class="bg-surface border-r border-white/[.12] flex flex-col flex-shrink-0" style="width: 16rem;">
        <div class="h-9 flex items-center justify-between px-3 border-b border-white/[.12]">
          <h2 class="text-sm font-semibold text-white/[.87]">Projects</h2>
          <button aria-label="Toggle Projects" class="text-white/[.54] hover:text-white/[.87] transition-colors" data-action="toggle-projects">
            <span aria-hidden="true">&laquo;</span>
          </button>
        </div>
        <div id="sidebar-content" class="flex-1 overflow-auto p-2">
          <!-- Server-pushed content -->
        </div>
      </nav>

      <!-- Resize: Sidebar | Main -->
      <div class="resize-handle-x w-1 cursor-col-resize bg-transparent hover:bg-accent/40 transition-colors flex-shrink-0" data-resize="sidebar-x"></div>

      <!-- Main Editor Area -->
      <main role="main" aria-label="Editor" class="flex-1 flex flex-col overflow-hidden">
        <!-- Tab Bar -->
        <div role="tablist" aria-label="Editor Tabs" class="h-9 flex bg-surface border-b border-white/[.12]">
          <button role="tab" aria-selected="false" aria-controls="panel-editor" id="tab-editor" class="px-4 h-9 text-sm text-white/[.54] hover:text-white/[.87] border-b-2 border-transparent hover:bg-white/[.04] transition-colors" data-tab="editor">Editor</button>
          <button role="tab" aria-selected="true" aria-controls="panel-diagrams" id="tab-diagrams" class="px-4 h-9 text-sm text-white/[.87] border-b-2 border-accent bg-white/[.04]" data-tab="diagrams">Diagrams</button>
          <button role="tab" aria-selected="false" aria-controls="panel-console" id="tab-console" class="px-4 h-9 text-sm text-white/[.54] hover:text-white/[.87] border-b-2 border-transparent hover:bg-white/[.04] transition-colors" data-tab="console">Console</button>
          <button role="tab" aria-selected="false" aria-controls="panel-workbench" id="tab-workbench" class="px-4 h-9 text-sm text-white/[.54] hover:text-white/[.87] border-b-2 border-transparent hover:bg-white/[.04] transition-colors" data-tab="workbench">Workbench</button>
        </div>

        <!-- Tab Panels -->
        <div role="tabpanel" id="panel-editor" aria-labelledby="tab-editor" class="flex-1 overflow-auto p-4" style="display:none">
          <div id="editor-content">
            <p class="text-white/[.38] text-sm">Select a file from the sidebar</p>
          </div>
        </div>

        <div role="tabpanel" id="panel-diagrams" aria-labelledby="tab-diagrams" class="flex-1 overflow-auto p-4">
          <div id="diagrams-content">
            <p class="text-white/[.38] text-sm">Select a domain to view diagrams</p>
          </div>
        </div>

        <div role="tabpanel" id="panel-console" aria-labelledby="tab-console" class="flex-1 overflow-auto p-4" style="display:none">
          <div id="console-content" role="form" aria-label="Console">
            <p class="text-white/[.38] text-sm">Open a project to use the console</p>
          </div>
        </div>
        <div role="tabpanel" id="panel-workbench" aria-labelledby="tab-workbench" class="flex-1 flex flex-col overflow-hidden" style="display:none">
          <div class="flex items-center gap-2 px-4 py-2 border-b border-white/[.12]">
            <div class="flex bg-elevated rounded overflow-hidden border border-white/[.12]">
              <button class="workbench-mode px-3 py-1 text-xs font-medium text-white/[.87] bg-accent" data-sketchmode="sketch">Sketch</button>
              <button class="workbench-mode px-3 py-1 text-xs font-medium text-white/[.54] hover:text-white/[.87]" data-sketchmode="play">Play</button>
            </div>
          </div>
          <div id="workbench-content" class="flex-1 flex overflow-hidden">
            <div id="workbench-repl" class="flex-1 flex flex-col overflow-hidden font-mono">
              <div id="workbench-output" class="flex-1 overflow-auto p-3 text-sm" style="background: #0a0a1a;"></div>
              <div class="flex items-center border-t border-white/[.12] bg-[#0d0d0d]">
                <span id="workbench-prompt" class="px-3 text-sm text-accent flex-shrink-0">sketch&gt;</span>
                <input type="text" id="workbench-input" autocomplete="off" spellcheck="false" class="flex-1 bg-transparent text-white/[.87] text-sm py-2 pr-3 focus:outline-none" placeholder="aggregate Pizza do; command CreatePizza; end">
              </div>
            </div>
          </div>
        </div>

      </main>

      <!-- Resize: Main | Right -->
      <div class="resize-handle-x w-1 cursor-col-resize bg-transparent hover:bg-accent/40 transition-colors flex-shrink-0" data-resize="right-x"></div>

      <!-- Right Panel -->
      <aside id="right-panel" role="complementary" aria-label="Right Panel" class="bg-surface border-l border-white/[.12] flex flex-col flex-shrink-0" style="width: 20rem;">
        <div role="tablist" aria-label="Right Panel Tabs" class="h-9 flex bg-surface border-b border-white/[.12]" data-tabgroup="right">
          <button role="tab" aria-selected="false" aria-controls="panel-agent" class="px-4 h-9 text-sm text-white/[.54] hover:text-white/[.87] border-b-2 border-transparent hover:bg-white/[.04] transition-colors" data-right-tab="agent">Agent</button>
          <button role="tab" aria-selected="true" aria-controls="panel-commands" class="px-4 h-9 text-sm text-white/[.87] border-b-2 border-accent bg-white/[.04]" data-right-tab="commands">HA Tests</button>
        </div>
        <div id="panel-agent" style="display: none;" class="flex-1 flex flex-col overflow-hidden">
          <div class="px-3 py-1.5 border-b border-white/[.12] flex items-center">
            <span class="text-xs text-white/[.38]">Agent</span>
          </div>
          <div id="agent-messages" class="flex-1 overflow-auto p-3 space-y-2" role="log" aria-label="Agent Messages" aria-live="polite"></div>
          <div class="p-3 border-t border-white/[.12] flex gap-2">
            <label for="agent-input-field" class="sr-only">Message to Claude</label>
            <input type="text" id="agent-input-field" placeholder="Ask about your domain..." aria-label="Message" autocomplete="off" class="flex-1 bg-elevated border border-white/[.12] rounded px-3 py-1.5 text-sm text-white/[.87] placeholder-white/[.38] focus:outline-none focus:border-accent">
            <button aria-label="Send Message" class="px-3 py-1.5 bg-accent hover:bg-accent-hover text-white text-sm rounded transition-colors" data-action="send-message">Send</button>
          </div>
        </div>
        <div id="panel-commands" class="flex-1 flex flex-col overflow-hidden">
          <div id="command-tester" class="flex-1 overflow-auto p-3 space-y-3">
            <p class="text-white/[.38] text-sm">Loading commands...</p>
          </div>
        </div>
      </aside>
    </div>

    <!-- Resize: Main | Events -->
    <div class="resize-handle-y h-1 cursor-row-resize bg-transparent hover:bg-accent/40 transition-colors flex-shrink-0" data-resize="events-y"></div>

    <!-- Events Panel -->
    <section id="events-panel" class="bg-surface border-t border-white/[.12]" aria-label="Events" style="height: 10rem;">
      <div class="h-8 flex items-center justify-between px-3 border-b border-white/[.12]">
        <h2 class="text-xs font-semibold text-white/[.87]">Events</h2>
        <div class="flex gap-1">
          <button aria-label="Pause Event Stream" class="px-2 py-0.5 text-xs text-white/[.54] hover:text-white/[.87] hover:bg-white/[.08] rounded transition-colors" data-action="pause-stream">Pause</button>
          <button aria-label="Clear Events" class="px-2 py-0.5 text-xs text-white/[.54] hover:text-white/[.87] hover:bg-white/[.08] rounded transition-colors" data-action="clear-events">Clear</button>
          <button aria-label="Toggle Events Panel" class="px-2 py-0.5 text-xs text-white/[.54] hover:text-white/[.87] hover:bg-white/[.08] rounded transition-colors" data-action="toggle-events">
            <span aria-hidden="true">&#9660;</span>
          </button>
        </div>
      </div>
      <div id="events-content" role="log" aria-label="Live Events" aria-live="polite" class="overflow-auto p-2 text-xs" style="height: calc(100% - 2rem)">
        <!-- Server-pushed events -->
      </div>
    </section>

    <!-- Status Bar -->
    <footer role="status" aria-label="Status Bar" class="h-6 flex items-center px-4 bg-surface border-t border-white/[.12] text-xs text-white/[.54]">
      <span id="connection-status" class="flex items-center gap-1.5 mr-4">
        <span class="w-2 h-2 rounded-full bg-red-500" aria-hidden="true"></span>
        Connecting...
      </span>
      <span id="domain-count" class="mr-4">0 domains</span>
      <span id="aggregate-count" class="mr-4">0 aggregates</span>
      <span id="cwd-path" class="text-white/[.38] truncate mr-4"></span>
      <span id="screenshot-status" class="flex items-center ml-auto cursor-pointer overflow-hidden" style="gap: 0;">
        <span class="screenshot-dot w-2 h-2 rounded-full bg-white/[.12] flex-shrink-0 transition-all duration-300" aria-hidden="true"></span>
        <span class="screenshot-label text-white/[.54] text-xs whitespace-nowrap overflow-hidden transition-all duration-300 ease-in-out" style="max-width: 0; opacity: 0; margin-left: 0;"></span>
      </span>
    </footer>
  </div>

  <script src="/assets/js/renderer.js?v=4"></script>
  <script src="/assets/js/renderer_panels.js?v=2"></script>
  <script src="/assets/js/status_indicators.js?v=1"></script>
  <script src="/assets/js/app.js?v=3"></script>
  <script src="/assets/js/socket.js?v=2"></script>
  <script src="/assets/js/menus.js?v=2"></script>
  <script src="/assets/js/actions.js?v=2"></script>
  <script src="/assets/js/panels.js?v=2"></script>
  <script src="/assets/js/animation.js?v=2"></script>
  <script src="/assets/js/keyboard.js?v=2"></script>
  <script src="/assets/js/command_tester.js?v=2"></script>
  <script src="/assets/js/workbench.js?v=1"></script>
  <script src="/assets/js/resize.js?v=1"></script>
  <script src="/assets/js/screenshots.js?v=2"></script>
</body>
</html>
