  <line x1="10" y1="23" x2="5" y2="26" stroke="#818cf8" stroke-width="1" stroke-linecap="round"/>
  <line x1="11" y1="27" x2="7" y2="31" stroke="#818cf8" stroke-width="1" stroke-linecap="round"/>
  <line x1="30" y1="19" x2="34" y2="22" stroke="#818cf8" stroke-width="1" stroke-linecap="round"/>
  <line x1="30" y1="23" x2="35" y2="26" stroke="#818cf8" stroke-width="1" stroke-linecap="round"/>
  <line x1="29" y1="27" x2="33" y2="31" stroke="#818cf8" stroke-width="1" stroke-linecap="round"/>
