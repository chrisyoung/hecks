  <circle cx="23" cy="11" r="1.5" fill="#e0e7ff"/>
  <circle cx="17.3" cy="11.2" r="0.7" fill="#1e1b4b"/>
  <circle cx="23.3" cy="11.2" r="0.7" fill="#1e1b4b"/>
