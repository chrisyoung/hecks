  <path d="M15 9 Q12 4 9 3" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M25 9 Q28 4 31 3" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="9" cy="3" r="1.2" fill="#a5b4fc"/>
  <circle cx="31" cy="3" r="1.2" fill="#a5b4fc"/>
